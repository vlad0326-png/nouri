const NUTRIENT_KEYS = Object.keys(DEFAULT_GOALS);
const USDA_NUTRIENT_IDS = {
  1008:"calories",1003:"protein_g",1005:"carbs_g",1004:"fat_g",1258:"saturated_fat_g",1079:"fiber_g",2000:"sugar_g",1093:"sodium_mg",
  1253:"cholesterol_mg",1106:"vitamin_a_mcg",1162:"vitamin_c_mg",1114:"vitamin_d_mcg",1109:"vitamin_e_mg",1185:"vitamin_k_mcg",
  1087:"calcium_mg",1089:"iron_mg",1090:"magnesium_mg",1091:"phosphorus_mg",1092:"potassium_mg",1095:"zinc_mg",1103:"selenium_mcg",
  1098:"copper_mg",1101:"manganese_mg",1165:"vitamin_b1_mg",1166:"vitamin_b2_mg",1167:"vitamin_b3_mg",1170:"vitamin_b5_mg",
  1175:"vitamin_b6_mg",1177:"vitamin_b9_mcg",1178:"vitamin_b12_mcg",
};
function normalizeNutrients(rawData, source){
  const out = Object.fromEntries(NUTRIENT_KEYS.map(k=>[k,0]));
  if(!rawData)return out;
  if(source==="usda"&&Array.isArray(rawData.foodNutrients)){
    rawData.foodNutrients.forEach(({nutrientId,value,unitName})=>{
      const key = USDA_NUTRIENT_IDS[nutrientId];
      if(!key)return;
      let v = Number(value);
      if(v!==v)return;
      const u = (unitName||"").toLowerCase();
      if(key.endsWith("_mcg")&&(u==="g"||u==="gram"))v*=1e6;
      else if(key.endsWith("_mg")&&(u==="g"||u==="gram"))v*=1000;
      else if(key.endsWith("_mcg")&&(u==="mg"))v*=1000;
      out[key]=v;
    });
    return out;
  }
  if(source==="nutritionix"&&typeof rawData==="object"){
    const n = rawData;
    const map=(v)=>Math.max(0,Number(v)||0);
    out.calories=map(n.nf_calories);out.protein_g=map(n.nf_protein);out.carbs_g=map(n.nf_total_carbohydrate);out.fat_g=map(n.nf_total_fat);
    out.fiber_g=map(n.nf_dietary_fiber);out.sugar_g=map(n.nf_sugars);out.sodium_mg=map(n.nf_sodium);
    out.cholesterol_mg=map(n.nf_cholesterol);out.saturated_fat_g=map(n.nf_saturated_fat);out.potassium_mg=map(n.nf_potassium);
    out.vitamin_a_mcg=map(n.nf_vitamin_a_mcg);out.vitamin_c_mg=map(n.nf_vitamin_c_mg);out.calcium_mg=map(n.nf_calcium_mg);out.iron_mg=map(n.nf_iron_mg);
    return out;
  }
  NUTRIENT_KEYS.forEach(k=>{const v=rawData[k];if(v!=null&&typeof v==="number"&&!Number.isNaN(v))out[k]=v;});
  return out;
}

function parseServingAmountGrams(servingSize){
  if(!servingSize)return null;
  const raw=String(servingSize).trim().toLowerCase();
  const matches=[
    {re:/(\d+(?:[.,]\d+)?)\s*(kg|kilogram|kilograms)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(g|gram|grams)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(l|liter|liters)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(ml|milliliter|milliliters)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(fl\s*oz|fluid ounce|fluid ounces)\b/,mult:29.5735},
    {re:/(\d+(?:[.,]\d+)?)\s*(oz|ounce|ounces)\b/,mult:28.3495},
  ];
  for(const {re,mult} of matches){
    const match=raw.match(re);
    if(match)return Math.round(parseFloat(match[1].replace(",", "."))*mult*10)/10;
  }
  return null;
}

function resizeImage(dataUrl,maxPx=1024){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onerror=()=>reject(new Error("Image failed to load"));
    img.onload=()=>{
      const scale=Math.min(1,maxPx/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };
    img.src=dataUrl;
  });
}

  const yest=new Date();yest.setDate(yest.getDate()-1);

  const servingFactor=servingAmountGrams?servingAmountGrams/100:null;
  const markReported=(key)=>{if(!reported.includes(key))reported.push(key);};
  const mapN=(offKey,nouriKey,mult=1)=>{
    const servingKey=offKey.replace(/_100g$/,"_serving");
    const servingValue=n[servingKey];

      markReported(nouriKey);

    cholesterol_mg:mapN("cholesterol_100g","cholesterol_mg",1000),vitamin_a_mcg:mapN("vitamin-a_100g","vitamin_a_mcg"),
    vitamin_b1_mg:mapN("vitamin-b1_100g","vitamin_b1_mg"),vitamin_b2_mg:mapN("vitamin-b2_100g","vitamin_b2_mg"),
    vitamin_b3_mg:mapN("vitamin-pp_100g","vitamin_b3_mg"),vitamin_b5_mg:mapN("pantothenic-acid_100g","vitamin_b5_mg"),
    vitamin_b6_mg:mapN("vitamin-b6_100g","vitamin_b6_mg"),vitamin_b9_mcg:mapN("folates_100g","vitamin_b9_mcg",1000),
    vitamin_b12_mcg:mapN("vitamin-b12_100g","vitamin_b12_mcg",1000),vitamin_c_mg:mapN("vitamin-c_100g","vitamin_c_mg"),
    vitamin_d_mcg:mapN("vitamin-d_100g","vitamin_d_mcg",1),vitamin_e_mg:mapN("vitamin-e_100g","vitamin_e_mg"),
    vitamin_k_mcg:mapN("vitamin-k_100g","vitamin_k_mcg",1000),calcium_mg:mapN("calcium_100g","calcium_mg",1000),
    iron_mg:mapN("iron_100g","iron_mg",1000),magnesium_mg:mapN("magnesium_100g","magnesium_mg",1000),
    phosphorus_mg:mapN("phosphorus_100g","phosphorus_mg",1000),potassium_mg:mapN("potassium_100g","potassium_mg",1000),
    zinc_mg:mapN("zinc_100g","zinc_mg",1000),selenium_mcg:mapN("selenium_100g","selenium_mcg",1000),
    manganese_mg:mapN("manganese_100g","manganese_mg",1000),copper_mg:mapN("copper_100g","copper_mg",1000),
    omega3_mg:mapN("omega-3-fat_100g","omega3_mg",1000),omega6_mg:mapN("omega-6-fat_100g","omega6_mg",1000),
    trans_fat_g:mapN("trans-fat_100g","trans_fat_g"),
  };
  const meal_totals=normalizeNutrients(nutrients,"off");
  const portionOz=servingAmountGrams?Math.round((servingAmountGrams/28.3495)*10)/10:3.5;

    components:[{name:p.product_name||"Product",portion_oz:portionOz,portion_description:portionDescription,cooking_method:"packaged",category:"other",confidence:"verified",nutrients:meal_totals,reportedNutrients:reported}],

function parseDSLDIngredientAmount(str){
  if(!str||typeof str!=="string")return null;
  const s=str.toLowerCase();
  const numMatch=s.match(/(\d+(?:\.\d+)?)\s*(mcg|mg|g|iu|µg)/i);
  if(!numMatch)return null;
  let v=parseFloat(numMatch[1]);const u=(numMatch[2]||"").toLowerCase();
  if(u==="iu"&&s.includes("vitamin d"))v*=0.025;
  else if(u==="iu"&&s.includes("vitamin e"))v*=0.67;
  else if(u==="iu"&&s.includes("vitamin a"))v*=0.3;
  else if(u==="g")v*=1000;
  else if(u==="µg"||u==="mcg"){}
  return v;
}
async function lookupNIHBarcode(barcode){

    if(!res.ok)return null;
    const data=await res.json();const items=data?.results||data?.data||[];
    const label=Array.isArray(items)?items[0]:items;
    if(!label)return null;
    const out=normalizeNutrients({},"usda");
    const ingredients=label.dietary_ingredients||label.ingredients||label.supplement_facts||[];
    (Array.isArray(ingredients)?ingredients:[]).forEach(ing=>{
      const name=(ing.name||ing.ingredient_name||ing.amount||"").toString().toLowerCase();
      const amountVal=parseDSLDIngredientAmount(ing.amount||ing.amount_per_serving||name)||parseDSLDIngredientAmount(name);
      for(const [key,internalKey] of Object.entries(DSLD_INGREDIENT_TO_KEY)){
        if(name.includes(key)&&amountVal!= null){out[internalKey]=(out[internalKey]||0)+amountVal;break;}
      }
    });
    const productName=label.product_name||label.brand_name||"Supplement";
    return{meal_name:productName,confidence:1.0,hand_detected:false,source:"barcode",dataSource:"nih",
      components:[{name:productName,portion_oz:0,portion_description:"per serving",cooking_method:"raw",category:"other",confidence:"verified",nutrients:out,reportedNutrients:Object.keys(out).filter(k=>out[k]>0)}],
      meal_totals:out,isSupplement:true};
  }catch{return null;}
}

  const q=encodeURIComponent(String(query).trim());if(!q)return [];

    const res=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${q}&json=1&page_size=${limit}&fields=product_name,nutriments,serving_size,brands`);
    const data=await res.json();const products=data?.products||[];
    return products.slice(0,limit).filter(p=>p.product_name).map(p=>{
      const n=p.nutriments||{};const servingSize=(p.serving_size||"").trim();
      const servingAmountGrams=parseServingAmountGrams(servingSize);const servingFactor=servingAmountGrams?servingAmountGrams/100:null;
      const get=(key,mult=1)=>{const v=n[key.replace(/_100g$/,"_serving")]??n[key];return v!=null?((servingFactor!=null&&!n[key.replace(/_100g$/,"_serving")])?v*servingFactor*mult:v*mult):0;};
      const nutrients=normalizeNutrients({
        calories:get("energy-kcal_100g"),protein_g:get("proteins_100g"),carbs_g:get("carbohydrates_100g"),fat_g:get("fat_100g"),
        saturated_fat_g:get("saturated-fat_100g"),fiber_g:get("fiber_100g"),sugar_g:get("sugars_100g"),sodium_mg:get("sodium_100g",1000),
        cholesterol_mg:get("cholesterol_100g",1000),vitamin_a_mcg:get("vitamin-a_100g"),vitamin_c_mg:get("vitamin-c_100g"),vitamin_d_mcg:get("vitamin-d_100g",1),
        vitamin_e_mg:get("vitamin-e_100g"),vitamin_k_mcg:get("vitamin-k_100g",1000),calcium_mg:get("calcium_100g",1000),iron_mg:get("iron_100g",1000),
        magnesium_mg:get("magnesium_100g",1000),phosphorus_mg:get("phosphorus_100g",1000),potassium_mg:get("potassium_100g",1000),
        zinc_mg:get("zinc_100g",1000),selenium_mcg:get("selenium_100g",1000),manganese_mg:get("manganese_100g",1000),copper_mg:get("copper_100g",1000),
        omega3_mg:get("omega-3-fat_100g",1000),omega6_mg:get("omega-6-fat_100g",1000),trans_fat_g:get("trans-fat_100g"),
      },"off");
      return{id:p.code||p._id||p.product_name,name:p.product_name,brand:p.brands||null,source:"off",confidence:"verified",nutrients,meal_totals:nutrients,dataSource:"off"};
    });
  }catch{return [];}
}

function dedupeSearchResults(results,limit=15){
  const seen=new Set();const out=[];
  for(const r of results){
    const n=(r.name||r.meal_name||"").toLowerCase().trim().replace(/\s+/g," ");
    if(!n||seen.has(n))continue;
    seen.add(n);out.push(r);
    if(out.length>=limit)break;
  }
  return out;
}

async function searchFood(query,options={}){
  const {type="food",limit=15,usdaApiKey}=options;
  const q=String(query||"").trim().toLowerCase();
  if(!q)return [];
  const [usdaRes,offRes]=await Promise.all([
    usdaApiKey?searchUSDA(query,usdaApiKey,8):Promise.resolve([]),
    searchOFF(query,10),
  ]);
  const combined=[...usdaRes,...offRes];
  return dedupeSearchResults(combined,limit);
}

function generateInsights(allMeals, goals, allCheckins){
  const dates=Object.keys(allMeals).sort();
  if(dates.length<7)return{insights:[],gaps:[],weeklyRhythm:[]};
  const dailyTotals={};
  dates.forEach(d=>{dailyTotals[d]=sumNutrients((allMeals[d]||[]).map(m=>({nutrients:m.meal_totals})));});
  const last21=dates.slice(-21);
  const gaps=[];
  Object.keys(DEFAULT_GOALS).forEach(k=>{
    if(!goals[k])return;
    const daysBelow=last21.filter(d=>((dailyTotals[d]?.[k]||0)/goals[k])<0.5);
    if(daysBelow.length>=14){
      const avg=last21.reduce((s,d)=>s+(dailyTotals[d]?.[k]||0),0)/last21.length;
      gaps.push({key:k,label:NUTRIENT_LABELS[k],avgPct:Math.round((avg/goals[k])*100)});
    }
  });
  gaps.sort((a,b)=>a.avgPct-b.avgPct);
  const insights=[];
  // Timing pattern
  const lateDays=dates.filter(d=>(allMeals[d]||[]).some(m=>new Date(m.timestamp).getHours()>=20));
  const earlyDays=dates.filter(d=>!lateDays.includes(d));
  if(allCheckins&&lateDays.length>=3&&earlyDays.length>=3){
    const avgSleepLate=lateDays.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].sleep_score||0),0)/Math.max(1,lateDays.filter(d=>allCheckins[d]).length);
    const avgSleepEarly=earlyDays.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].sleep_score||0),0)/Math.max(1,earlyDays.filter(d=>allCheckins[d]).length);
    if(avgSleepEarly-avgSleepLate>=0.5&&earlyDays.filter(d=>allCheckins[d]).length>=3){
      insights.push({id:"sleep_timing",icon:"🌙",color:C.purple,label:"SLEEP PATTERN",title:"Earlier dinners = better sleep",text:`On days you stop eating by 8:30 PM, you rate your sleep ${avgSleepEarly.toFixed(1)} vs ${avgSleepLate.toFixed(1)} on late-eating nights.`});
    }else{
      insights.push({id:"timing",icon:"🌙",color:C.purple,label:"TIMING PATTERN",title:"Late eating detected",text:`You've eaten after 8:30 PM on ${lateDays.length} days. In Phase 2, this will correlate with Whoop recovery + HRV data.`});
    }
  }
  // Day-of-week sodium
  const wkday=dates.filter(d=>![0,6].includes(parseLocalDateKey(d).getDay())).map(d=>dailyTotals[d]);
  const wkend=dates.filter(d=>[0,6].includes(parseLocalDateKey(d).getDay())).map(d=>dailyTotals[d]);
  if(wkday.length>=5&&wkend.length>=2){
    const wdNa=wkday.reduce((s,d)=>s+(d.sodium_mg||0),0)/wkday.length;
    const weNa=wkend.reduce((s,d)=>s+(d.sodium_mg||0),0)/wkend.length;
    if(weNa>wdNa*1.5)insights.push({id:"dow_sodium",icon:"📅",color:C.amber,label:"WEEKLY PATTERN",title:"Weekend sodium is higher",text:`Your weekend sodium is ${(weNa/wdNa).toFixed(1)}x your weekday average — likely from dining out.`});
  }
  // Protein timing
  const goodProt=dates.filter(d=>(allMeals[d]||[]).filter(m=>new Date(m.timestamp).getHours()<12).reduce((s,m)=>s+(m.meal_totals?.protein_g||0),0)>=30);
  const lowProt=dates.filter(d=>!goodProt.includes(d));
  if(goodProt.length>=3&&lowProt.length>=3){
    const gp=goals.protein_g||50;
    const gc=goodProt.reduce((s,d)=>s+Math.min(1,(dailyTotals[d]?.protein_g||0)/gp),0)/goodProt.length;
    const lc=lowProt.reduce((s,d)=>s+Math.min(1,(dailyTotals[d]?.protein_g||0)/gp),0)/lowProt.length;
    // Energy correlation
    if(allCheckins&&goodProt.filter(d=>allCheckins[d]).length>=3){
      const gcE=goodProt.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/goodProt.filter(d=>allCheckins[d]).length;
      const lcE=lowProt.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/Math.max(1,lowProt.filter(d=>allCheckins[d]).length);
      if(gcE-lcE>=0.5){insights.push({id:"protein_energy",icon:"💪",color:C.green,label:"ENERGY INSIGHT",title:"Morning protein boosts energy",text:`On days with 30g+ protein before noon, you rate your energy ${gcE.toFixed(1)} vs ${lcE.toFixed(1)} on other days.`});}
    } else if(gc>lc*1.1){
      insights.push({id:"protein_timing",icon:"💪",color:C.green,label:"PROTEIN INSIGHT",title:"Morning protein matters",text:`When you eat 30g+ protein before noon, you end the day ${Math.round((gc-lc)*100)}% closer to your protein target.`});
    }
  }
  // Nutrient-energy correlations
  if(allCheckins){
    Object.keys(NUTRIENT_INFO).slice(0,5).forEach(k=>{
      if(!goals[k])return;
      const highDays=dates.filter(d=>allCheckins[d]&&(dailyTotals[d]?.[k]||0)/goals[k]>=0.6);
      const lowDays=dates.filter(d=>allCheckins[d]&&(dailyTotals[d]?.[k]||0)/goals[k]<0.4);
      if(highDays.length>=3&&lowDays.length>=3){
        const hE=highDays.reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/highDays.length;
        const lE=lowDays.reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/lowDays.length;
        if(hE-lE>=0.5){
          insights.push({id:`energy_${k}`,icon:"⚡",color:C.amber,label:"ENERGY PATTERN",title:`${NUTRIENT_LABELS[k]} affects your energy`,text:`When your ${NUTRIENT_LABELS[k]} is on target, you rate your energy ${hE.toFixed(1)} — vs ${lE.toFixed(1)} on low days.`});
        }
      }
    });
  }
  // Streaks
  Object.keys(DEFAULT_GOALS).slice(0,8).forEach(k=>{
    if(!goals[k])return;
    let streak=0,best=0;
    dates.forEach(d=>{if((dailyTotals[d]?.[k]||0)/goals[k]>=0.8){streak++;best=Math.max(best,streak);}else streak=0;});
    if(best>=3)insights.push({id:`streak_${k}`,icon:"🔥",color:C.amber,label:"STREAK",title:`${NUTRIENT_LABELS[k]}: ${best}-day streak`,text:`You hit your ${NUTRIENT_LABELS[k]} target ${best} days in a row.`});
  });
  const weeklyRhythm=dates.slice(-7).map(d=>{
    const t=dailyTotals[d]||{};
    const scores=Object.keys(DEFAULT_GOALS).map(k=>goals[k]?Math.min(1,(t[k]||0)/goals[k]):0);
    return{date:d,score:scores.reduce((s,v)=>s+v,0)/scores.length,label:parseLocalDateKey(d).toLocaleDateString("en",{weekday:"short"}).slice(0,3)};
  });
  return{insights:insights.slice(0,8),gaps:gaps.slice(0,5),weeklyRhythm};
}

function buildWeeklySummary(allMeals, goals){
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(localDateKey(d));}
  const mealsThisWeek=last7.reduce((s,d)=>s+(allMeals[d]?.length||0),0);
  const allComponents=last7.flatMap(d=>(allMeals[d]||[]).map(m=>({nutrients:m.meal_totals})));
  const weekTotals=sumNutrients(allComponents);
  const scores=last7.map(d=>{const ms=allMeals[d]||[];return ms.length>0?ms.reduce((s,m)=>s+mealScore(m.meal_totals,goals),0)/ms.length:null;}).filter(s=>s!==null);
  const avgScore=scores.length?Math.round(scores.reduce((s,v)=>s+v,0)/scores.length*10)/10:0;
  const nutScores=MICRO_KEYS.map(k=>({key:k,label:NUTRIENT_LABELS[k],pct:pct(weekTotals[k]||0,(goals[k]||DEFAULT_GOALS[k])*7)}));
  nutScores.sort((a,b)=>b.pct-a.pct);
  const topNut=nutScores[0]||{label:"Vitamin K"};
  const gapNut=nutScores[nutScores.length-1]||{label:"Magnesium"};
  return{mealsThisWeek,avgScore,topNut:topNut.label,gapNut:gapNut.label};
}

function AnimatedNumber({ value, duration = 600, decimals = 0, punchy = false }) {
  const [displayValue, setDisplayValue] = useState(0);
  const prevValue = useRef(0);
  useEffect(() => {
    const start = prevValue.current;
    const end = value || 0;
    const startTime = performance.now();
    const animate = (currentTime) => {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = punchy
        ? 1 - Math.pow(1 - progress, 2.5)
        : 1 - Math.pow(1 - progress, 3);
      const current = start + (end - start) * eased;
      setDisplayValue(current);
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        prevValue.current = end;
      }
    };
    requestAnimationFrame(animate);
  }, [value, duration, punchy]);
  return (
    <span style={{ fontVariantNumeric: 'tabular-nums' }}>
      {decimals > 0 ? displayValue.toFixed(decimals) : Math.round(displayValue)}
    </span>
  );
}

// ─── HERO RING ────────────────────────────────────────────────────────────────
function HeroRing({totals, goals, avgScore, meals}) {
  const noMeals = meals.length === 0;
  const calGoal = goals.calories || 2000;
  const protGoal = (goals && goals.protein_g != null) ? goals.protein_g : DEFAULT_GOALS.protein_g;
  const protGoalVal = protGoal || DEFAULT_GOALS.protein_g;
  const calPct = Math.min(1, (totals.calories||0) / calGoal);
  const protPct = Math.min(1, (totals.protein_g||0) / protGoalVal);
  const scorePct = Math.min(1, (avgScore||0) / 10);
  const size = 180; const cx = 90; const cy = 90;
  const rings = [
    {r:78, sw:6, pct:calPct,  color:"#3ECF8E"},
    {r:64, sw:5, pct:protPct, color:"rgba(255,255,255,0.6)"},
    {r:51, sw:4, pct:scorePct,color:"rgba(251,191,36,0.7)"},
  ];
  const ringEasing = "cubic-bezier(0, 0.71, 0.2, 1.01)";
  const ringDuration = 1.8;
  const ringStagger = 0.35;
  const calLabel = noMeals ? "Log your first meal" : `${Math.round(totals.calories||0).toLocaleString()} / ${calGoal.toLocaleString()} cal`;
  const protLabel = `${Math.round(totals.protein_g||0)}g / ${protGoalVal}g protein`;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:32,marginTop:4}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          {rings.map(({r,sw,pct,color},i)=>{
            const circ=2*Math.PI*r;
            const offset=circ*(1-pct);
            return(<g key={i}>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth={sw}/>
              {pct>0&&<circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw+8}
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{filter:"blur(8px)",opacity:0.25,transition:`stroke-dashoffset ${ringDuration}s ${ringEasing}`,transitionDelay:`${i*ringStagger}s`}}/>}
              <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{transition:`stroke-dashoffset ${ringDuration}s ${ringEasing}`,transitionDelay:`${i*ringStagger}s`}}/>
            </g>);
          })}
        </svg>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,animation:"breathe 3s ease-in-out infinite",zIndex:1}}>
          <div style={{fontSize:42,fontWeight:700,color:C.textPrimary,letterSpacing:"-2px",lineHeight:1,animation:"countUp 0.4s ease"}}>
            {noMeals ? "—" : <AnimatedNumber value={avgScore||0} decimals={1} duration={1800} punchy={true}/>}
          </div>
          <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.25)",letterSpacing:"1.5px",textTransform:"uppercase"}}>
            NOURI SCORE
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:14,marginTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#3ECF8E",flexShrink:0}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{calLabel}</span>
        </div>
        {!noMeals&&(<div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:3,background:"rgba(255,255,255,0.6)",flexShrink:0}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{protLabel}</span>
        </div>)}
      </div>
    </div>
  );
}

function TodayScreen({meals,goals,allMeals,allCheckins,onViewMeal,onMealAdjust,dayCount,profile,onCheckinDone,onMilestoneDismiss,pendingMilestone}){
  const [viewDate,setViewDate]=useState(today());
  const isToday=viewDate===today();
  const viewMeals=useMemo(()=>isToday?meals:(allMeals[viewDate]||[]),[isToday,meals,allMeals,viewDate]);
  const viewTotals=useMemo(()=>sumNutrients(viewMeals.map(m=>({nutrients:m.meal_totals}))),[viewMeals]);
  const [checkinDone,setCheckinDone]=useState(false);
  const [sleep,setSleep]=useState(0);
  const [energy,setEnergy]=useState(0);
  const [gapCollapsed,setGapCollapsed]=useState(false);
  const [tick,setTick]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setTick(n=>n+1),60000);
    return()=>clearInterval(t);
  },[]);
  const [weeklyCollapsed,setWeeklyCollapsed]=useState(false);

  const hour=new Date().getHours();
  const greeting=hour<11?"Good morning":hour<16?"Good afternoon":"Good evening";

  const prevDay=()=>{const d=new Date(viewDate+'T12:00:00');d.setDate(d.getDate()-1);setViewDate(localDateKey(d));};
  const nextDay=()=>{if(viewDate>=today())return;const d=new Date(viewDate+'T12:00:00');d.setDate(d.getDate()+1);setViewDate(localDateKey(d));};
  const dateLabel=useMemo(()=>{
    if(isToday)return null;
    const yest=new Date();yest.setDate(yest.getDate()-1);
    if(viewDate===localDateKey(yest))return"Yesterday";
    return new Date(viewDate+'T12:00:00').toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"});
  },[viewDate,isToday]);

  const macros=[{key:"calories",label:"Calories",icon:"⚡",color:C.amber},{key:"protein_g",label:"Protein",icon:"💪",color:C.green},{key:"carbs_g",label:"Carbs",icon:"🌾",color:C.blue},{key:"fat_g",label:"Fat",icon:"🥑",color:C.purple}];

  const hasCheckin=allCheckins&&allCheckins[today()];
  const dayScores=viewMeals.filter(m=>m.meal_totals).map(m=>mealScore(m.meal_totals,goals));
  const avgScore=dayScores.length?Math.round(dayScores.reduce((s,v)=>s+v,0)/dayScores.length*10)/10:null;

  // Gaps for today
  const gapItems=viewMeals.length>0?Object.keys(NUTRIENT_FOOD_SUGGESTIONS).map(k=>({key:k,label:NUTRIENT_LABELS[k],pct:pct(viewTotals[k]||0,goals[k]||DEFAULT_GOALS[k]),foods:NUTRIENT_FOOD_SUGGESTIONS[k]})).filter(g=>g.pct<40).sort((a,b)=>a.pct-b.pct).slice(0,3):[];

  // Post-meal check
  const lastMeal=meals[meals.length-1];
  const showPostMeal=useMemo(()=>{
    if(!isToday)return false;
    if(!lastMeal||lastMeal.post_meal_checked)return false;
    if(lastMeal.source==="quick")return false;
    if((lastMeal.meal_totals?.calories||0)<50)return false;
    const elapsed=(Date.now()-new Date(lastMeal.timestamp).getTime())/60000;
    return elapsed>25&&elapsed<120;
  },[lastMeal,tick,isToday]);

  // Insight rotation
  const insightData=useMemo(()=>{
    if(dayCount<7)return null;
    const{insights}=generateInsights(allMeals,goals,allCheckins);
    if(!insights.length)return null;
    const idx=Math.floor(Date.now()/86400000)%insights.length;
    return insights[idx];
  },[allMeals,goals,allCheckins,dayCount]);

  // Weekly summary (Sunday or Monday)
  const dow=new Date().getDay();
  const showWeekly=(dow===0||dow===1)&&dayCount>=7;
  const weeklySummary=showWeekly?buildWeeklySummary(allMeals,goals):null;

  const submitCheckin=()=>{
    if(!sleep||!energy)return;
    onCheckinDone({sleep_score:sleep,energy_score:energy});
    setCheckinDone(true);

  const contentBottomPadding = "max(128px, calc(100px + env(safe-area-inset-bottom)))";

            <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>{isToday?new Date().toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"}):dateLabel}</div>
            <div style={{color:C.textPrimary,fontSize:32,fontWeight:700,marginTop:3,letterSpacing:"-0.5px"}}>{isToday?greeting:dateLabel}</div>
          </div>

        </div>

          {isToday&&(profile?.current_streak||0)>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.09)",borderRadius:20,padding:"6px 12px"}}>

              <div style={{color:C.amber,fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:12}}>NUTRIENTS TO BUILD</div>

  );
}

// ─── HISTORY SCREEN ───────────────────────────────────────────────────────────
function HistoryScreen({allMeals,goals,onViewMeal}){
  const now=new Date();
  const [calYear,setCalYear]=useState(now.getFullYear());
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [selectedDate,setSelectedDate]=useState(null);
  const dates=Object.keys(allMeals).sort().reverse();

  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const calDays=[];
  for(let i=0;i<firstDay;i++)calDays.push(null);
  for(let d=1;d<=daysInMonth;d++)calDays.push(d);

  const getDayScore=(d)=>{
    const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const meals=allMeals[dk]||[];
    if(!meals.length)return null;
    const totals=sumNutrients(meals.map(m=>({nutrients:m.meal_totals})));
    const scores=Object.keys(DEFAULT_GOALS).map(k=>goals[k]?Math.min(1,(totals[k]||0)/goals[k]):0);
    return scores.reduce((s,v)=>s+v,0)/scores.length;
  };

  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const displayDates=selectedDate?[selectedDate]:dates;

  const contentBottomPadding = "max(128px, calc(100px + env(safe-area-inset-bottom)))";
  return(
    <div style={{padding:`56px 24px ${contentBottomPadding}`,overflowY:"auto",height:"100dvh"}}>
      <div style={{marginBottom:20}}>
        <div style={{color:C.textVeryDim,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>Your</div>
        <div style={{color:C.textPrimary,fontSize:22,fontWeight:700,marginTop:4}}>History</div>
      </div>
      {/* Calendar */}
      <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"16px 18px",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>{let m=calMonth-1;let y=calYear;if(m<0){m=11;y--;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:C.textDim,fontSize:18,cursor:"pointer",padding:"8px 16px",touchAction:"manipulation"}}>‹</button>
          <div style={{color:C.textPrimary,fontSize:14,fontWeight:600}}>{monthNames[calMonth]} {calYear}</div>
          <button onClick={()=>{let m=calMonth+1;let y=calYear;if(m>11){m=0;y++;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:C.textDim,fontSize:18,cursor:"pointer",padding:"8px 16px",touchAction:"manipulation"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",color:C.textVeryDim,fontSize:10,fontWeight:600,padding:"2px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {calDays.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const score=getDayScore(d);
            const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const isSelected=selectedDate===dk;
            return(
              <button key={i} onClick={()=>setSelectedDate(isSelected?null:dk)} style={{aspectRatio:"1",borderRadius:6,border:`0.5px solid ${isSelected?C.green:score!=null?"rgba(62,207,142,0.2)":"transparent"}`,background:score!=null?`rgba(62,207,142,${0.08+score*0.5})`:"transparent",color:isSelected?C.green:score!=null?C.textPrimary:C.textVeryDim,fontSize:11,fontWeight:score!=null?600:400,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                {d}
                {score!=null&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:3,height:3,borderRadius:2,background:C.green}}/>}
              </button>
            );
          })}
        </div>
        {selectedDate&&<button onClick={()=>setSelectedDate(null)} style={{display:"block",width:"100%",marginTop:8,background:"none",border:"none",color:C.textVeryDim,fontSize:12,cursor:"pointer"}}>Show all</button>}
      </div>
      {/* Meal list */}
      {dates.length===0?<div style={{color:C.textDim,fontSize:14,textAlign:"center",paddingTop:30}}>Your food history will appear here.</div>
      :displayDates.map(date=>{
        const meals=allMeals[date]||[];if(!meals.length)return null;
        const totals=sumNutrients(meals.map(m=>({nutrients:m.meal_totals})));
        return(
          <div key={date} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{color:C.textDim,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{parseLocalDateKey(date).toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"})}</div>
              <div style={{color:C.textVeryDim,fontSize:11}}>{Math.round(totals.calories)} cal</div>
            </div>
            <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:4,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:`${pct(totals.calories,goals.calories||2000)}%`,background:C.amber,borderRadius:2}}/>
            </div>
            {meals.map((meal,i)=><MealEntry key={meal.id} meal={meal} index={i} onTap={typeof onViewMeal==="function"?()=>onViewMeal(meal):undefined} goals={goals}/>)}
          </div>
        );
      })}
      {selectedDate&&!(allMeals[selectedDate]||[]).length&&(
        <div style={{color:C.textDim,fontSize:13,textAlign:"center",paddingTop:12}}>No meals logged on {parseLocalDateKey(selectedDate).toLocaleDateString("en",{month:"short",day:"numeric"})}.</div>
      )}
    </div>
  );
}

// ─── ME SCREEN ────────────────────────────────────────────────────────────────
function MeScreen({profile,goals,quickAdds,onSave,onRecalibrate,onSaveQuickAdds}){
  const [localGoals,setLocalGoals]=useState({...goals});
  const [preset,setPreset]=useState(profile.goal_preset||"general");
  const [saved,setSaved]=useState(false);
  const [localQA,setLocalQA]=useState((quickAdds||DEFAULT_QUICK_ADDS).map(normalizeQuickAdd));
  const [editingQA,setEditingQA]=useState(null);
  const [newQA,setNewQA]=useState(null);
  const EMOJIS=["💧","☕","💊","🥤","🍌","🥜","🍎","🥛","🧃","🍫","🥚","🫐"];

  const applyPreset=p=>{setPreset(p);if(p==="general")setLocalGoals({...DEFAULT_GOALS});else if(p==="high_protein")setLocalGoals({...HIGH_PROTEIN_GOALS});};
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('nouri:api_key')||'');
  const saveApiKey=(k)=>{setApiKey(k);localStorage.setItem('nouri:api_key',k);};
  const [usdaApiKey,setUsdaApiKey]=useState(()=>profile?.usda_api_key||'');
  React.useEffect(()=>{if(profile?.usda_api_key!=null)setUsdaApiKey(profile.usda_api_key);},[profile?.usda_api_key]);
  const handleSave=()=>{
    onSave({...profile, goals:localGoals, goal_preset:preset, usda_api_key:usdaApiKey||undefined});setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const QAForm=({item,onDone,onCancel})=>{
    const [name,setName]=useState(item?.label||"");
    const [emoji,setEmoji]=useState(item?.emoji||"🥤");
    const [cal,setCal]=useState(item?.nutrients?.calories||0);
    const [prot,setProt]=useState(item?.nutrients?.protein_g||0);
    const [carb,setCarb]=useState(item?.nutrients?.carbs_g||0);
    const [fat,setFat]=useState(item?.nutrients?.fat_g||0);
    const save=()=>{
      if(!name.trim())return;
      const num=(v)=>Math.max(0,Number(v)||0);
      const nutrients={...Object.fromEntries(Object.keys(DEFAULT_GOALS).map(k=>[k,0])),calories:num(cal),protein_g:num(prot),carbs_g:num(carb),fat_g:num(fat)};
      onDone({id:item?.id||uid(),label:name.trim(),emoji,nutrients});
    };
    return(
      <div style={{background:C.inputBg,border:`0.5px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {EMOJIS.map(e=>(<button key={e} onClick={()=>setEmoji(e)} style={{width:44,height:44,borderRadius:8,border:`1px solid ${e===emoji?C.green:C.border}`,background:e===emoji?C.greenDim:"transparent",fontSize:18,cursor:"pointer",touchAction:"manipulation"}}>{e}</button>))}
        </div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Item name" style={{width:"100%",padding:"8px 12px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textPrimary,fontSize:14,marginBottom:8}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["Cal",cal,setCal],["Protein g",prot,setProt],["Carbs g",carb,setCarb],["Fat g",fat,setFat]].map(([l,v,s])=>(
            <div key={l}>
              <div style={{color:C.textVeryDim,fontSize:10,marginBottom:3}}>{l}</div>
              <input type="number" value={v} onChange={e=>s(e.target.value)} style={{width:"100%",padding:"6px 10px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textPrimary,fontSize:13}}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={{flex:1,padding:"8px",background:`linear-gradient(135deg,${C.green},${C.green2})`,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save</button>
          <button onClick={onCancel} style={{flex:1,padding:"8px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    );
  };

  const saveQA=(updated)=>{const norm=updated.map(normalizeQuickAdd);setLocalQA(norm);onSaveQuickAdds(norm);};

  const csvCell=(v)=>{const s=String(v??'');return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`  :s;};
  const exportCSV=async()=>{
    const mealsByDate=await storage.get('nouri:meals')||{};
    const rows=[["date","time","meal","source",...Object.keys(DEFAULT_GOALS)]];
    Object.keys(mealsByDate).sort().forEach(dk=>{
      (mealsByDate[dk]||[]).forEach(m=>{
        rows.push([dk,m.timestamp?new Date(m.timestamp).toLocaleTimeString():"",m.meal_name||"",m.source||"",...Object.keys(DEFAULT_GOALS).map(k=>m.meal_totals?.[k]||0)]);
      });
    });
    const csv=rows.map(r=>r.map(csvCell).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="nouri-export.csv";a.click();URL.revokeObjectURL(url);
  };

  const contentBottomPadding = "max(140px, calc(110px + env(safe-area-inset-bottom)))";
  return(
    <div style={{padding:`56px 24px ${contentBottomPadding}`,overflowY:"auto",height:"100dvh"}}>
      <div style={{background:"linear-gradient(135deg, rgba(62,207,142,0.06), transparent)",border:`1px solid rgba(62,207,142,0.12)`,borderRadius:16,padding:20,marginBottom:24,display:"flex",alignItems:"center",gap:16}}>
        <div style={{width:64,height:64,borderRadius:16,background:C.greenDim,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:28,fontWeight:700,color:C.green}}>N</span>
        </div>
        <div style={{flex:1}}>
          <div style={{color:C.textPrimary,fontSize:22,fontWeight:700,letterSpacing:"-0.03em"}}>Profile & Goals</div>
          <div style={{color:C.textTertiary,fontSize:13,marginTop:4}}>Customize your nutrition targets</div>
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>GOAL TEMPLATE</div>
        <div style={{display:"flex",gap:8}}>
          {[["general","General Health"],["high_protein","High Protein"],["custom","Custom"]].map(([id,label])=>(
            <button key={id} onClick={()=>applyPreset(id)} style={{flex:1,padding:"10px 4px",borderRadius:10,background:preset===id?"rgba(62,207,142,0.10)":"rgba(255,255,255,0.04)",border:`0.5px solid ${preset===id?"rgba(62,207,142,0.45)":"rgba(255,255,255,0.07)"}`,color:preset===id?C.green:C.textDim,fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.15s ease"}}>{label}</button>
          ))}
        </div>
        <div style={{color:C.textVeryDim,fontSize:11,marginTop:8}}>Change these anytime.</div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>DAILY GOALS</div>
        {MACRO_KEYS.map(k=>(
          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{color:C.textDim,fontSize:13}}>{NUTRIENT_LABELS[k]}</div>
            <input type="number" value={localGoals[k]||""} onChange={e=>{setPreset("custom");setLocalGoals(g=>({...g,[k]:Number(e.target.value)}));}} style={{width:80,padding:"10px 12px",background:C.bgInput,border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,color:C.textPrimary,fontSize:14,textAlign:"right",transition:"all 0.2s ease"}}/>
          </div>
        ))}
      </div>
      {/* Hand calibration */}
      <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"16px 18px",marginBottom:16}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>HAND CALIBRATION</div>
        {profile.hand_calibrated?(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{color:C.green,fontSize:13,fontWeight:600}}>Calibrated</div><div style={{color:C.textDim,fontSize:12}}>Palm: {profile.palm_width_inches}"w × {profile.palm_length_inches}"l</div></div>
            <button onClick={onRecalibrate} style={{background:C.inputBg,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:12,padding:"6px 12px",cursor:"pointer"}}>Recalibrate</button>
          </div>
        ):(
          <div>
            <div style={{color:C.textDim,fontSize:13,marginBottom:10}}>Add your hand measurement for more accurate portions.</div>
            <button onClick={onRecalibrate} style={{background:C.greenDim,border:`0.5px solid ${C.green}44`,borderRadius:8,color:C.green,fontSize:13,fontWeight:600,padding:"8px 16px",cursor:"pointer"}}>Calibrate Now</button>
          </div>
        )}
      </div>
      {/* Quick adds config */}
      <div style={{marginBottom:16}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>QUICK ADDS</div>
        {localQA.map((item,idx)=>(
          <div key={item.id}>
            {editingQA===item.id?(
              <QAForm item={item} onDone={updated=>{const next=[...localQA];next[idx]=updated;saveQA(next);setEditingQA(null);}} onCancel={()=>setEditingQA(null)}/>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`0.5px solid ${C.border}`}}>
                <span style={{fontSize:20}}>{item.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{color:C.textPrimary,fontSize:13,fontWeight:600}}>{item.label}</div>
                  <div style={{color:C.textVeryDim,fontSize:11}}>{item.nutrients.calories||0} cal · {item.nutrients.protein_g||0}g protein</div>
                </div>
                <button onClick={()=>setEditingQA(item.id)} style={{background:"none",border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:11,padding:"4px 10px",cursor:"pointer"}}>Edit</button>
                <button onClick={()=>saveQA(localQA.filter((_,i)=>i!==idx))} style={{background:"none",border:"none",color:C.textVeryDim,fontSize:16,cursor:"pointer",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>×</button>
              </div>
            )}
          </div>
        ))}
        {newQA?<QAForm item={null} onDone={item=>{saveQA([...localQA,item]);setNewQA(false);}} onCancel={()=>setNewQA(false)}/>
        :<button onClick={()=>setNewQA(true)} style={{width:"100%",padding:"10px",background:C.inputBg,border:`0.5px dashed ${C.border}`,borderRadius:10,color:C.textDim,fontSize:13,cursor:"pointer",marginTop:8}}>+ Add custom item</button>}
      </div>
      <button onClick={exportCSV} style={{width:"100%",padding:13,background:"rgba(255,255,255,0.04)",border:"0.5px solid rgba(255,255,255,0.07)",borderRadius:12,color:C.textDim,fontSize:13,fontWeight:500,cursor:"pointer",marginBottom:12}}>Export to CSV</button>

        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>DATA SOURCES</div>
        <div style={{color:C.textDim,fontSize:12,marginBottom:10}}>USDA FoodData Central — free key for barcode fallback and generic food search.</div>
        <input type="password" value={usdaApiKey} onChange={e=>setUsdaApiKey(e.target.value)} placeholder="USDA API key (optional)"
          style={{width:'100%',padding:'10px 12px',background:C.bgInput,border:`1px solid ${usdaApiKey?C.green:C.border}`,borderRadius:10,color:C.textPrimary,fontSize:13,fontFamily:'monospace',marginBottom:6}}/>
        <a href="https://fdc.nal.usda.gov/api-key-signup.html" target="_blank" rel="noopener noreferrer" style={{color:C.green,fontSize:11}}>Get free key →</a>
      </div>
      {/* API key */}
      <div style={{background:C.card,border:`0.5px solid ${C.border}`,borderRadius:12,padding:'14px 16px',marginBottom:12}}>
        <div style={{color:C.green,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:8}}>AI CONNECTION</div>
        <div style={{color:C.textDim,fontSize:12,marginBottom:8}}>Paste your Anthropic API key to enable photo analysis and food search. Get a free key at anthropic.com.</div>
        <input
          type='password'
          value={apiKey}
          onChange={e=>saveApiKey(e.target.value)}
          placeholder='sk-ant-...'
          style={{width:'100%',padding:'14px 16px',background:C.bgInput,border:`1px solid ${apiKey?C.green:C.border}`,
            borderRadius:12,color:C.textPrimary,fontSize:14,fontFamily:'monospace',transition:'all 0.2s ease'}}
        />
        {apiKey&&<div style={{color:C.green,fontSize:11,marginTop:6}}>✓ Key saved</div>}
        {!apiKey&&<div style={{color:C.amber,fontSize:11,marginTop:6}}>⚠ Required for photo analysis and food search</div>}
      </div>
      <button onClick={handleSave} style={{width:"100%",padding:15,background:C.green,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 6px 20px rgba(62,207,142,0.28)`,letterSpacing:"-0.1px"}}>{saved?"Saved!":"Save Goals"}</button>
      <div style={{textAlign:"center",marginTop:28,color:C.textVeryDim,fontSize:11}}>Your food. Your body. Connected.</div>
    </div>
  );
}

// ─── MEAL VIEW SCREEN ─────────────────────────────────────────────────────────

  useEffect(()=>{if(step===1)startCam();return()=>stopCam();},[step]);
  const startCam=async()=>{try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});streamRef.current=s;if(videoRef.current)videoRef.current.srcObject=s;}catch{setError("Camera access required.");}};
  const stopCam=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  const capture=async()=>{
    if(!videoRef.current)return;setError(null);
    if(!getApiKey()||!getApiKey().trim()){setError("Add your API key in Me to use hand calibration.");return;}
    const canvas=document.createElement("canvas");canvas.width=videoRef.current.videoWidth;canvas.height=videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current,0,0);stopCam();setStep(2);
    try{
      const b64=await resizeImage(canvas.toDataURL("image/jpeg"));
      const res=await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":getApiKey(),"anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:500,
          system:"You are measuring a human hand next to a standard credit card (3.375 x 2.125 inches). Estimate the palm width (across the widest part, excluding thumb) and palm length (wrist to base of middle finger). Respond ONLY in JSON: {\"palm_width_inches\": X.X, \"palm_length_inches\": X.X}",
          messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:"Measure this hand using the credit card as scale reference."}]}]
        })

      if(!res.ok)throw new Error("API error");

      setResult({palm_width_inches:Math.round(pw*10)/10,palm_length_inches:Math.round(pl*10)/10});

            strokeDasharray="77 35" strokeDashoffset="35"/>

            strokeDasharray="42 20" strokeDashoffset="20"/>
        </svg>
        <div style={{color:C.textPrimary,fontSize:30,fontWeight:700,textAlign:"center",letterSpacing:"-0.5px",lineHeight:1.2,marginBottom:14}}>

// ─── FOOD DETAIL SCREEN ───────────────────────────────────────────────────────
function hydrateComponent(c) {
  const baseNutrients = { ...(c?._baseNutrients || c?.nutrients || {}) };
  const cookingMethod = c?.cooking_method || "raw";
  const explicitMult = c?._mult ?? c?.portion_multiplier;
  const learnedMult = c?.learnedMultiplier ?? c?.learned_multiplier;
  const mult = explicitMult ?? learnedMult ?? 1;
  const isUsual = explicitMult == null && learnedMult != null;
  const adj = COOKING_ADJUSTMENTS[cookingMethod] || {};
  const nutrients = {};
  Object.keys(baseNutrients).forEach(k => {
    const baseValue = baseNutrients[k] || 0;
    const cookedValue = adj[k] != null ? baseValue * adj[k] : baseValue;
    nutrients[k] = cookedValue * mult;
  });
  return { ...c, _baseNutrients: baseNutrients, cooking_method: cookingMethod, _mult: mult, _isUsual: isUsual, nutrients };
}

function SupplementPicker({ onLog, onClose }) {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState([]);
  const [activeCategory, setActiveCategory] = useState(null);

  const filtered = useMemo(() => {
    let list = SUPPLEMENT_DB;
    if (activeCategory) list = list.filter(s => s.category === activeCategory);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(s => s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q));
    }
    return list;
  }, [search, activeCategory]);

  const toggleSupplement = (supp) => {
    setSelected(prev => {
      const exists = prev.find(s => s.id === supp.id);
      if (exists) return prev.filter(s => s.id !== supp.id);
      return [...prev, { ...supp, qty: 1 }];
    });
  };

  const updateQty = (id, delta) => {
    setSelected(prev => prev.map(s => s.id === id ? { ...s, qty: Math.max(1, Math.min(5, s.qty + delta)) } : s));
  };

  const logSelected = () => {
    if (!selected.length) return;
    const components = selected.map(s => ({
      name: s.name,
      _mult: s.qty,
      category: 'supplement',
      confidence: 'verified',
      nutrients: Object.fromEntries(Object.entries(s.nutrients).map(([k, v]) => [k, v * s.qty])),
    }));
    const totals = {};
    Object.keys(DEFAULT_GOALS).forEach(k => { totals[k] = components.reduce((sum, c) => sum + (c.nutrients[k] || 0), 0); });
    const names = selected.map(s => s.qty > 1 ? `${s.name} ×${s.qty}` : s.name);
    const meal = {
      id: Date.now().toString(),
      timestamp: new Date().toISOString(),
      meal_name: names.length === 1 ? names[0] : `${names.length} supplements`,
      source: 'supplement',
      confidence: 1.0,
      hand_detected: false,
      photo_data: null,
      components,
      meal_totals: totals,
    };
    onLog(meal, true);
  };

  const isSelected = (id) => selected.find(s => s.id === id);

  return (
    <div style={{position:'fixed',inset:0,background:C.bg,zIndex:500,display:'flex',flexDirection:'column',animation:'slideUp 0.3s ease'}}>
      {/* Header */}
      <div style={{padding:'16px 20px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:`0.5px solid ${C.border}`}}>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.textDim,fontSize:15,cursor:'pointer',padding:8,touchAction:'manipulation'}}>Cancel</button>
        <div style={{color:C.textPrimary,fontSize:16,fontWeight:700}}>Log Supplements</div>
        <button onClick={logSelected} disabled={!selected.length}
          style={{background:'none',border:'none',color:selected.length?C.green:C.textDisabled,fontSize:15,fontWeight:600,cursor:selected.length?'pointer':'default',padding:8,touchAction:'manipulation'}}>
          Log{selected.length ? ` (${selected.length})` : ''}
        </button>
      </div>

      {/* Search */}
      <div style={{padding:'12px 20px 8px'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search supplements..."
          style={{width:'100%',background:C.bgInput,border:`1px solid ${C.borderLight}`,borderRadius:12,color:'#fff',padding:'12px 16px',fontSize:15,outline:'none'}}/>
      </div>

      {/* Category pills */}
      <div style={{padding:'4px 20px 12px',display:'flex',gap:8,overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <button onClick={()=>setActiveCategory(null)}
          style={{padding:'6px 14px',borderRadius:20,background:!activeCategory?C.green:'rgba(255,255,255,0.05)',
            border:`0.5px solid ${!activeCategory?'transparent':C.border}`,color:!activeCategory?'#000':C.textDim,
            fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,touchAction:'manipulation'}}>All</button>
        {SUPPLEMENT_CATEGORIES.map(cat=>(
          <button key={cat} onClick={()=>setActiveCategory(activeCategory===cat?null:cat)}
            style={{padding:'6px 14px',borderRadius:20,background:activeCategory===cat?C.green:'rgba(255,255,255,0.05)',
              border:`0.5px solid ${activeCategory===cat?'transparent':C.border}`,color:activeCategory===cat?'#000':C.textDim,
              fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,touchAction:'manipulation'}}>{cat}</button>
        ))}
      </div>

      {/* Supplement list */}
      <div style={{flex:1,overflowY:'auto',padding:'0 20px',paddingBottom:'max(140px, calc(110px + env(safe-area-inset-bottom)))'}}>
        {filtered.map((supp, i) => {
          const sel = isSelected(supp.id);
          const topNutrients = Object.entries(supp.nutrients).filter(([k,v])=>v>0&&k!=='calories').slice(0,3).map(([k,v])=>`${NUTRIENT_LABELS[k]||k}: ${v}${k.includes('mcg')?'mcg':k.includes('_mg')?'mg':'g'}`);
          return (
            <div key={supp.id} onClick={()=>toggleSupplement(supp)}
              style={{display:'flex',alignItems:'center',gap:14,padding:'14px 0',borderBottom:`0.5px solid ${C.divider}`,cursor:'pointer',
                animation:`fadeIn 0.3s cubic-bezier(0.25,0.1,0.25,1) ${Math.min(i*0.03,0.3)}s both`}}>
              <div style={{width:44,height:44,borderRadius:12,background:sel?C.greenDim:'rgba(255,255,255,0.04)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,
                border:sel?`1.5px solid ${C.green}`:`0.5px solid ${C.border}`,transition:'all 0.15s ease'}}>
                {sel ? '✓' : supp.emoji}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:sel?C.textPrimary:C.textSecondary,fontSize:14,fontWeight:600,letterSpacing:'-0.02em'}}>{supp.name}</div>
                <div style={{color:C.textDim,fontSize:11,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {topNutrients.length ? topNutrients.join(' · ') : supp.category}
                </div>
              </div>
              {sel && (
                <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>updateQty(supp.id,-1)} style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'none',color:C.textDim,fontSize:16,cursor:'pointer',touchAction:'manipulation'}}>−</button>
                  <span style={{color:C.textPrimary,fontSize:14,fontWeight:600,minWidth:20,textAlign:'center',fontVariantNumeric:'tabular-nums'}}>{sel.qty}</span>
                  <button onClick={()=>updateQty(supp.id,1)} style={{width:32,height:32,borderRadius:8,background:'rgba(255,255,255,0.06)',border:'none',color:C.textDim,fontSize:16,cursor:'pointer',touchAction:'manipulation'}}>+</button>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length===0 && (
          <div style={{textAlign:'center',padding:'40px 20px',color:C.textDim}}>
            <div style={{fontSize:32,marginBottom:12}}>💊</div>
            <div style={{fontSize:14,fontWeight:500}}>No supplements found</div>
            <div style={{fontSize:12,marginTop:6,color:C.textVeryDim}}>Try a different search term</div>
          </div>
        )}
      </div>

      {/* Selected summary bar */}
      {selected.length > 0 && (
        <div style={{position:'fixed',bottom:0,left:0,right:0,padding:'12px 20px',paddingBottom:'calc(12px + env(safe-area-inset-bottom))',
          background:'linear-gradient(to top, rgba(0,0,0,0.98) 50%, transparent)',zIndex:501}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
            {selected.map(s=>(
              <span key={s.id} style={{background:C.greenDim,border:`0.5px solid ${C.green}33`,borderRadius:8,padding:'4px 10px',fontSize:12,color:C.green,fontWeight:500}}>
                {s.emoji} {s.name}{s.qty>1?` ×${s.qty}`:''}
              </span>
            ))}
          </div>
          <button onClick={logSelected}
            style={{width:'100%',padding:'15px',background:C.green,border:'none',borderRadius:14,
              color:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 20px rgba(62,207,142,0.3)',touchAction:'manipulation'}}>
            Log {selected.length} supplement{selected.length>1?'s':''}
          </button>
        </div>
      )}
    </div>
  );
}

function SnapScreen({ profile, onLogMeal, quickAdds, learnedPortions, initialMode }) {
  const [mode, setMode] = React.useState(initialMode || 'camera'); // camera | search | barcode
  const [stream, setStream] = React.useState(null);
  const [captured, setCaptured] = React.useState(null);
  const [analyzing, setAnalyzing] = React.useState(false);
  const [analysisStep, setAnalysisStep] = React.useState(0);
  const [searchText, setSearchText] = React.useState('');
  const [searchResults, setSearchResults] = React.useState([]);
  const [searchLoading, setSearchLoading] = React.useState(false);
  const [barcodeInput, setBarcodeInput] = React.useState('');
  const [error, setError] = React.useState('');
  const [showSupplementPicker, setShowSupplementPicker] = React.useState(false);
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const barcodeDetectorRef = React.useRef(null);
  const fileInputRef = React.useRef(null);
  const scanIntervalRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const searchDebounceRef = React.useRef(null);
  const [showManualBarcode, setShowManualBarcode] = React.useState(false);

  const ANALYSIS_STEPS = ['Identifying foods...','Estimating portions...','Calculating nutrients...','Almost done...'];

  React.useEffect(() => {
    setMode(initialMode || 'camera');
    setCaptured(null);
    setSearchText('');
    setSearchResults([]);
    setBarcodeInput('');
    setError('');
    setShowManualBarcode(false);
  }, [initialMode]);

  React.useEffect(() => {
    const q = searchText.trim();
    if (!q) { setSearchResults([]); setSearchLoading(false); return; }
    if (searchDebounceRef.current) clearTimeout(searchDebounceRef.current);
    setSearchLoading(true);
    searchDebounceRef.current = setTimeout(async () => {
      const results = await searchFood(q, { limit: 15, usdaApiKey: profile?.usda_api_key });
      setSearchResults(results || []);
      setSearchLoading(false);
      searchDebounceRef.current = null;
    }, 300);
    return () => { if (searchDebounceRef.current) clearTimeout(searchDebounceRef.current); };
  }, [searchText, profile?.usda_api_key]);

  function stopStream() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setStream(null);
  }

  React.useEffect(() => {
    const supportsBarcodeScanning = mode === 'barcode' && ("BarcodeDetector" in window);
    if (mode === 'camera' || supportsBarcodeScanning) {
      startCamera();
    } else {
      stopStream();
    }
    if (mode === 'barcode' && !("BarcodeDetector" in window)) {
      setShowManualBarcode(true);
    } else if (mode !== 'barcode') {
      setShowManualBarcode(false);
    }
    return () => { stopStream(); };
  }, [mode]);

  // BarcodeDetector scanning effect
  React.useEffect(() => {
    if (mode === 'barcode' && stream && videoRef.current) {
      if ('BarcodeDetector' in window) {
        barcodeDetectorRef.current = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128'] });
        scanIntervalRef.current = setInterval(async () => {
          if (videoRef.current && videoRef.current.readyState === 4 && !analyzing) {
            try {
              const codes = await barcodeDetectorRef.current.detect(videoRef.current);
              if (codes.length > 0) {
                clearInterval(scanIntervalRef.current);
                setBarcodeInput(codes[0].rawValue);
                analyzeBarcodeCode(codes[0].rawValue);
              }
            } catch {}
          }
        }, 300);
      }
    }
    return () => { if (scanIntervalRef.current) clearInterval(scanIntervalRef.current); };
  }, [mode, stream, analyzing]);

  React.useEffect(() => {
    let interval;
    if (analyzing) {
      interval = setInterval(() => {
        setAnalysisStep(s => (s + 1) % ANALYSIS_STEPS.length);
      }, 2000);
    }
    return () => clearInterval(interval);
  }, [analyzing]);

  async function startCamera() {
    stopStream();
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' }, audio: false });
      streamRef.current = s;
      setStream(s);
      if (videoRef.current) videoRef.current.srcObject = s;
    } catch(e) { setError('Camera access denied. Use search instead.'); }
  }

  function capturePhoto() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const MAX = 1024;
    let w = video.videoWidth, h = video.videoHeight;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    stopStream();
    setCaptured(dataUrl);
  }

  function handleGallerySelect(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const resized = await resizeImage(reader.result);
        setCaptured(`data:image/jpeg;base64,${resized}`);
        stopStream();
      } catch(err) { setError('Could not load image'); }
    };
    reader.readAsDataURL(file);
  }

  async function analyzePhoto() {
    if (!captured) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await analyzeFood({
        imageBase64: captured.split(',')[1],
        palmWidth: profile?.hand_calibrated ? profile.palm_width_inches : null,
        palmLength: profile?.hand_calibrated ? profile.palm_length_inches : null,
      });
      result.source = 'meal';
      result.photo_data = captured;
      // attach learned portions
      result.components = (result.components || []).map(c => {
        const key = c.name.toLowerCase().trim();
        const learned = learnedPortions[key];
        if (learned && learned.count >= 3) return { ...c, learnedMultiplier: learned.avgMultiplier };
        return c;
      });
      onLogMeal(result);
    } catch(e) { setError(e?.message || 'Couldn\'t analyze the photo. Try again or use Search mode.'); }
    finally { setAnalyzing(false); }
  }

  function selectSearchResult(r) {
    const nutrients = r.meal_totals || r.nutrients || {};
    const meal = {
      meal_name: r.name || r.meal_name || 'Food',
      confidence: r.confidence === 'verified' ? 1.0 : 0.9,
      hand_detected: false,
      source: 'search',
      dataSource: r.dataSource || r.source,
      components: [{ name: r.name || r.meal_name, _mult: 1, portion_oz: 3.5, portion_description: '1 serving', cooking_method: 'raw', category: 'other', confidence: r.confidence || 'verified', nutrients, reportedNutrients: Object.keys(nutrients).filter(k => nutrients[k] > 0) }],
      meal_totals: nutrients,
    };
    onLogMeal(meal);
  }

  async function analyzeSearch() {
    if (!searchText.trim()) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await analyzeFood({ text: searchText });
      result.source = 'search';
      result.dataSource = 'ai';
      result.components = (result.components || []).map(c => {
        const key = c.name.toLowerCase().trim();
        const learned = learnedPortions[key];
        if (learned && learned.count >= 3) return { ...c, learnedMultiplier: learned.avgMultiplier };
        return c;
      });
      onLogMeal(result);
    } catch(e) { setError(e?.message || 'Couldn\'t complete search. Try again.'); }
    finally { setAnalyzing(false); }
  }

  async function analyzeBarcodeCode(directCode) {
    const code = directCode || barcodeInput.trim();
    if (!code) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await lookupBarcodeWithWaterfall(code, profile?.usda_api_key);
      if (!result) { setError('Product not found. Try searching manually.'); setAnalyzing(false); return; }
      result.source = 'barcode';
      onLogMeal(result);
    } catch(e) { setError(e?.message || 'Barcode not found. Try searching manually.'); }
    finally { setAnalyzing(false); }
  }
  const analyzeBarcode = () => analyzeBarcodeCode();

  function tapQuickAdd(qa) {
    const label = qa.label || qa.name || "Quick Add";
    const nutrients = { ...Object.fromEntries(Object.keys(DEFAULT_GOALS).map(k=>[k,0])), ...(qa.nutrients||{}) };
    const meal = {
      id: Date.now().toString(),
      timestamp: new Date().toISOString(),
      meal_name: label,
      source: 'quick',
      components: [{ name: label, _mult: 1, category: 'other', confidence: 'quick', nutrients }],
      meal_totals: nutrients,
      photo_data: null,
      confidence: 1.0,
    };
    onLogMeal(meal, true);
  }

  if (analyzing) return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#000000',color:'#fff',gap:16,padding:32,position:'relative',overflow:'hidden'}}>
      {captured&&<div style={{position:'absolute',inset:0,backgroundImage:`url(${captured})`,backgroundSize:'cover',backgroundPosition:'center',filter:'blur(30px) brightness(0.3)'}}/>}
      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
        <div style={{position:'relative',width:120,height:120,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={{position:'absolute',inset:-10,border:'2px solid rgba(62,207,142,0.19)',borderRadius:'50%',borderTopColor:'#3ECF8E',animation:'spin 3s linear infinite'}}/>
          <div style={{width:80,height:80,borderRadius:'50%',background:C.greenDim,display:'flex',alignItems:'center',justifyContent:'center',animation:'breathe 2s ease-in-out infinite'}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3ECF8E" strokeWidth="1.5" strokeLinecap="round"><path d="M12 3l1.5 3.5L17 8l-3.5 1.5L12 13l-1.5-3.5L7 8l3.5-1.5L12 3z"/><path d="M19 13l1 2.5L22.5 17l-2.5 1L19 20.5l-1-2.5L15.5 17l2.5-1L19 13z" opacity="0.5"/></svg>
          </div>
        </div>
        <p style={{color:'#3ECF8E',fontSize:17,fontWeight:600,margin:0,animation:'fadeIn 0.3s ease'}}>{ANALYSIS_STEPS[analysisStep]}</p>
        <p style={{color:'rgba(255,255,255,0.2)',fontSize:13,margin:0}}>Powered by AI</p>
      </div>
    </div>
  );

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'#000000',overflow:'hidden'}}>
      {/* Mode toggle */}
      <div style={{padding:"16px 20px 8px",background:"#000000"}}>
        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:20,padding:3,display:"flex"}}>
          {[['camera','Snap'],['barcode','Barcode'],['search','Search']].map(([m,label]) => (
            <button key={m} onClick={()=>{ setMode(m); setCaptured(null); setError(''); }}
              style={{flex:1,padding:"9px 0",borderRadius:17,background:mode===m?"#3ECF8E":"transparent",border:"none",color:mode===m?"#000":"rgba(255,255,255,0.3)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s ease"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {error && <div style={{background:'#1a0000',color:'#f87171',padding:'10px 16px',fontSize:13}}>{error}</div>}

      {/* Camera mode */}
      {mode==='camera' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#000000'}}>
          {!captured ? (
            <>
              <video ref={videoRef} autoPlay playsInline muted style={{flex:1,objectFit:'cover',width:'100%'}}/>
              <canvas ref={canvasRef} style={{display:'none'}}/>
              {/* Cinematic overlay */}
              <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                {/* Corner brackets + scan line (behind text) */}
                <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-55%)',width:280,height:280,borderRadius:24,zIndex:0}}>
                  <div style={{position:'absolute',top:0,left:0,width:40,height:40,borderTop:'3px solid #3ECF8E',borderLeft:'3px solid #3ECF8E',borderRadius:'24px 0 0 0'}}/>
                  <div style={{position:'absolute',top:0,right:0,width:40,height:40,borderTop:'3px solid #3ECF8E',borderRight:'3px solid #3ECF8E',borderRadius:'0 24px 0 0'}}/>
                  <div style={{position:'absolute',bottom:0,left:0,width:40,height:40,borderBottom:'3px solid #3ECF8E',borderLeft:'3px solid #3ECF8E',borderRadius:'0 0 0 24px'}}/>
                  <div style={{position:'absolute',bottom:0,right:0,width:40,height:40,borderBottom:'3px solid #3ECF8E',borderRight:'3px solid #3ECF8E',borderRadius:'0 0 24px 0'}}/>
                  <div style={{position:'absolute',left:'10%',right:'10%',top:'50%',height:2,background:'linear-gradient(90deg, transparent, #3ECF8E, transparent)',boxShadow:'0 0 20px #3ECF8E',animation:'scanLine 2s ease-in-out infinite',opacity:0.7}}/>
                </div>
                <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-80%)',color:'rgba(255,255,255,0.45)',fontSize:13,fontWeight:500,textAlign:'center',whiteSpace:'nowrap',zIndex:2}}>Point at your meal</div>
                <div style={{position:'absolute',bottom:116,left:0,right:0,textAlign:'center',color:'rgba(255,255,255,0.22)',fontSize:11,zIndex:2}}>AI identifies food and estimates portions</div>
                {profile?.hand_calibrated&&<div style={{position:'absolute',top:20,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.55)',backdropFilter:'blur(8px)',borderRadius:20,padding:'5px 14px',color:'rgba(255,255,255,0.4)',fontSize:11,whiteSpace:'nowrap',zIndex:2}}>Tip: rest your hand near the plate</div>}

                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </button>
                <button onClick={capturePhoto} style={{width:72,height:72,borderRadius:'50%',background:'transparent',border:'4px solid rgba(255,255,255,0.3)',cursor:'pointer',boxShadow:'0 4px 30px rgba(0,0,0,0.4)',outline:'none',WebkitTapHighlightColor:'transparent',touchAction:'manipulation',display:'flex',alignItems:'center',justifyContent:'center'}}>

              </div>

          ) : (
            <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative'}}>
              <img src={captured} style={{flex:1,objectFit:'cover',width:'100%'}}/>
              <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',gap:12,padding:'16px 16px 110px',background:'linear-gradient(to top,rgba(0,0,0,0.95) 60%,transparent)',zIndex:200}}>
                <button onClick={()=>{ setCaptured(null); startCamera(); }}
                  style={{flex:1,padding:'15px 0',background:'rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.75)',border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>
                  Retake
                </button>
                <button onClick={analyzePhoto}
                  style={{flex:2,padding:'15px 0',background:'#3ECF8E',color:'#000',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 0 16px rgba(62,207,142,0.3)',touchAction:'manipulation'}}>
                  Analyze →
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Search mode */}
      {mode==='search' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:"20px",paddingBottom:"max(120px, calc(100px + env(safe-area-inset-bottom)))",gap:14,background:"#000000",overflowY:'auto'}}>
          <input
            type="text"
            value={searchText}
            onChange={e=>setSearchText(e.target.value)}
            placeholder="Search foods — e.g. chicken breast, Greek yogurt"
            style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:12,color:'#fff',padding:'14px 16px',fontSize:15,outline:'none',width:'100%',boxSizing:'border-box'}}
          />
          {searchLoading && <div style={{color:C.textDim,fontSize:13}}>Searching...</div>}
          {!searchLoading&&searchResults.length>0 && (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',margin:0}}>Results</p>
              {searchResults.map((r,i)=>(
                <button key={r.id||i} onClick={()=>selectSearchResult(r)}
                  style={{textAlign:'left',background:C.card,border:`0.5px solid ${C.border}`,borderRadius:12,padding:'12px 14px',color:C.textPrimary,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600}}>{r.name||r.meal_name}</div>
                    <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{r.source==='usda'?'USDA':r.source==='off'?'Open Food Facts':r.source}</div>

          {!searchLoading&&searchText.trim()&&searchResults.length===0&&searchText.length>=2 && (
            <div style={{color:C.textDim,fontSize:13}}>No database matches. Try AI for custom meals.</div>

          <button onClick={analyzeSearch} disabled={!searchText.trim()}
            style={{padding:'12px 0',background:searchText.trim()?'rgba(167,139,250,0.2)':'rgba(255,255,255,0.06)',color:searchText.trim()?C.purple:'rgba(255,255,255,0.25)',
              border:`0.5px solid ${searchText.trim()?C.purple+'44':C.border}`,borderRadius:12,fontSize:14,fontWeight:600,cursor:searchText.trim()?'pointer':'default',transition:'all 0.15s ease'}}>
