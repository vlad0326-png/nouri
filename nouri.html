          </button>
          <div>
            <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',margin:'4px 0 10px'}}>Quick Add</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {quickAdds.map((qa,i) => (
                <button key={i} onClick={()=>tapQuickAdd(qa)}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'rgba(255,255,255,0.04)',
                    border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:20,color:'rgba(255,255,255,0.75)',fontSize:13,cursor:'pointer',touchAction:'manipulation'}}>
                  <span>{qa.emoji}</span><span>{qa.label || qa.name}</span>
                </button>
              ))}
              <button onClick={()=>setShowSupplementPicker(true)}
                style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:C.purpleDim,
                  border:`0.5px solid ${C.purple}44`,borderRadius:20,color:C.purple,fontSize:13,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>
                <span>💊</span><span>Supplements</span>
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Barcode mode */}
      {mode==='barcode' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#000000'}}>
          {'BarcodeDetector' in window ? (
            <>
              {/* Camera viewfinder */}
              <video ref={videoRef} autoPlay playsInline muted style={{flex:1,objectFit:'cover',width:'100%'}}/>
              {/* Scanning line animation */}
              <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                <div style={{position:'absolute',left:'10%',right:'10%',top:'20%',bottom:'20%',
                  border:'1px solid rgba(62,207,142,0.3)',borderRadius:12}}>
                  <div style={{position:'absolute',left:0,right:0,height:2,background:'#3ECF8E',
                    animation:'scanLine 1.8s ease-in-out infinite',top:'50%'}}/>
                </div>
              </div>
              <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0))',
                padding:'14px 20px 110px',display:'flex',flexDirection:'column',gap:10,alignItems:'center',zIndex:200}}>
                <p style={{color:'#3ECF8E',fontSize:14,fontWeight:600,margin:0,letterSpacing:'-0.1px'}}>Scanning for barcode...</p>
                <button onClick={()=>setShowManualBarcode(s=>!s)}
                  style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:12,cursor:'pointer'}}>
                  {showManualBarcode ? 'Hide manual entry' : 'Or type barcode manually'}
                </button>
                {showManualBarcode && (
                  <div style={{display:'flex',gap:8,width:'100%'}}>
                    <input type='number' value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)}
                      placeholder='e.g. 012345678905'
                      style={{flex:1,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:12,
                        color:'#fff',padding:'14px 16px',fontSize:15,outline:'none',transition:'all 0.2s ease'}}/>
                    <button onClick={analyzeBarcode} disabled={!barcodeInput.trim()}
                      style={{padding:'10px 16px',background:barcodeInput.trim()?'#3ECF8E':'rgba(255,255,255,0.06)',
                        color:barcodeInput.trim()?'#000':'rgba(255,255,255,0.3)',border:'none',borderRadius:10,
                        fontSize:14,fontWeight:700,cursor:barcodeInput.trim()?'pointer':'default'}}>
                      Go
                    </button>
                  </div>
                )}
              </div>
            </>
          ) : (
            /* Fallback: no BarcodeDetector (Safari) */
            <div style={{flex:1,display:'flex',flexDirection:'column',padding:20,gap:16}}>
              <p style={{color:'#aaa',fontSize:14,margin:0}}>Camera scanning works best in Chrome. Enter barcode number below.</p>
              <input type='number' value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)}
                placeholder='e.g. 012345678905'
                style={{background:'rgba(255,255,255,0.06)',border:'1px solid #333',borderRadius:12,color:'#fff',padding:14,fontSize:16}}/>
              <button onClick={analyzeBarcode} disabled={!barcodeInput.trim()}
                style={{padding:'14px 0',background:barcodeInput.trim()?'#3ECF8E':'rgba(255,255,255,0.06)',
                  color:barcodeInput.trim()?'#000':'rgba(255,255,255,0.3)',border:'none',borderRadius:12,
                  fontSize:16,fontWeight:700,cursor:barcodeInput.trim()?'pointer':'default'}}>
                Look Up →
              </button>
              <p style={{color:'#555',fontSize:12,textAlign:'center',margin:0}}>Barcode data from Open Food Facts.</p>
            </div>
          )}
        </div>
      )}
      {showSupplementPicker && <SupplementPicker onLog={(meal,skip)=>{setShowSupplementPicker(false);onLogMeal(meal,skip);}} onClose={()=>setShowSupplementPicker(false)}/>}
    </div>
  );
}

// ── Goals helper ─────────────────────────────────────────────────────────────
function computeGoals(profile) {
  if (!profile) return { ...DEFAULT_GOALS };
  const base = profile.goal_preset === 'high_protein' ? { ...HIGH_PROTEIN_GOALS } : { ...DEFAULT_GOALS };
  // Always merge saved profile.goals so custom edits are respected
  return { ...base, ...(profile.goals || {}) };
}

// ── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState('loading');
  const [initError, setInitError] = React.useState(null);
  const [profile, setProfile] = React.useState(null);
  const [pendingMeal, setPendingMeal] = React.useState(null);
  const [tab, setTab] = React.useState('today');
  const [snapInitialMode, setSnapInitialMode] = React.useState('camera');
  const [toast, setToast] = React.useState('');
  const [allMeals, setAllMeals] = React.useState({});
  const [allCheckins, setAllCheckins] = React.useState({});
  const [learnedPortions, setLearnedPortions] = React.useState({});
  const [quickAdds, setQuickAdds] = React.useState(DEFAULT_QUICK_ADDS);
  const [milestoneQueue, setMilestoneQueue] = React.useState([]);
  const toastTimerRef = React.useRef(null);
  const [todayKey, setTodayKey] = React.useState(() => today());
  React.useEffect(() => () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); }, []);
  React.useEffect(() => {
    const syncTodayKey = () => {
      const next = today();
      setTodayKey(prev => prev === next ? prev : next);
    };
    syncTodayKey();
    const interval = setInterval(syncTodayKey, 60000);
    return () => clearInterval(interval);
  }, []);

  const runInit = React.useCallback(async () => {
    let profileData = null;
    setInitError(null);
    try {
      const [p, meals, checkins, learned, qa] = await Promise.all([
        storage.get('nouri:profile'),
        storage.get('nouri:meals'),
        storage.get('nouri:checkins'),
        storage.get('nouri:learned-portions'),
        storage.get('nouri:quick-adds'),
      ]);
      profileData = p;
      if (p) setProfile(p);
      if (meals) setAllMeals(meals);
      if (checkins) setAllCheckins(checkins);
      if (learned) setLearnedPortions(learned);
      if (Array.isArray(qa)) setQuickAdds(qa.map(normalizeQuickAdd));
      setScreen(profileData && profileData.onboarded ? 'main' : 'onboard');
    } catch(e) {
      setInitError(String(e));
      setScreen('loading');
    }
  }, []);

  // Load all data on mount
  React.useEffect(() => { runInit(); }, []);

  function showToast(msg) {
    setToast(msg);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(''), 2500);
  }

  const todayMeals = allMeals[todayKey] || [];

  function computeTotals(meals) {
    const totals = {};
    meals.forEach(m => {
      Object.keys(m.meal_totals || {}).forEach(k => {
        totals[k] = (totals[k] || 0) + (m.meal_totals[k] || 0);
      });
    });
    return totals;
  }
  const todayTotals = computeTotals(todayMeals);
  const goals = profile ? computeGoals(profile) : { ...DEFAULT_GOALS };

  // Called from SnapScreen: meal either goes to FoodDetail or logs directly (quick adds)
  function handleMealReady(meal, directLog = false) {
    if (directLog) {
      logMeal(meal);
    } else {
      setPendingMeal(meal);
      setScreen('foodDetail');
    }
  }

  // Called from FoodDetailScreen: logMeal(components, totals, false)
  // Called from quick-add path: logMeal(mealObj)
  async function logMeal(componentsOrMeal, totalsArg, _fromDetail) {
    let meal;
    if (Array.isArray(componentsOrMeal)) {
      // FoodDetailScreen signature: (components[], totals{}, bool)
      const rawPhoto = pendingMeal?.photo_data;
      // Strip data URL prefix so MealEntry can re-add it
      const photoBase64 = rawPhoto && rawPhoto.startsWith('data:') ? rawPhoto.split(',')[1] : rawPhoto;
      meal = {
        id: Date.now().toString(),
        timestamp: new Date().toISOString(),
        meal_name: pendingMeal ? (pendingMeal.meal_name || 'Meal') : 'Meal',
        source: pendingMeal ? pendingMeal.source : 'meal',
        confidence: pendingMeal ? pendingMeal.confidence : 0.9,
        hand_detected: pendingMeal ? pendingMeal.hand_detected : false,
        photo_data: photoBase64 || null,
        components: componentsOrMeal,
        meal_totals: totalsArg,
      };
    } else {
      meal = componentsOrMeal;
      if (!meal.id) meal.id = Date.now().toString();
      if (!meal.timestamp) meal.timestamp = new Date().toISOString();
    }
    const dateKey = meal.timestamp ? localDateKey(new Date(meal.timestamp)) : todayKey;
    setTodayKey(prev => prev === dateKey ? prev : dateKey);
    const updated = { ...allMeals };
    if (!updated[dateKey]) updated[dateKey] = [];

    // Assign id if missing
    if (!meal.id) meal.id = Date.now().toString();
    updated[dateKey] = [...updated[dateKey], meal];

    setAllMeals(updated);
    await storage.set('nouri:meals', updated);

    // Update learned portions
    const newLearned = { ...learnedPortions };
    (meal.components || []).forEach(c => {
      const key = c.name.toLowerCase().trim();
      const m = c._mult || c.portion_multiplier || 1;
      if (!newLearned[key]) newLearned[key] = { count: 0, avgMultiplier: m, lastUsed: dateKey };
      const prev = newLearned[key];
      const newCount = prev.count + 1;
      newLearned[key] = {
        count: newCount,
        avgMultiplier: (prev.avgMultiplier * prev.count + m) / newCount,
        lastUsed: dateKey,
      };
    });
    setLearnedPortions(newLearned);
    await storage.set('nouri:learned-portions', newLearned);

    // Update streak + check milestones
    const updatedProfile = updateStreak({ ...profile });
    const allDayMeals = updated[dateKey];
    const totalMeals = Object.values(updated).reduce((s, arr) => s + arr.length, 0);
    const newMilestones = checkMilestones(updatedProfile, totalMeals);
    if (newMilestones.length) {
      if (!updatedProfile.milestones_shown) updatedProfile.milestones_shown = [];
      newMilestones.forEach(ms => updatedProfile.milestones_shown.push(ms.id));
      setMilestoneQueue(q => [...q, ...newMilestones]);
    }
    setProfile(updatedProfile);
    await storage.set('nouri:profile', updatedProfile);

    showToast('Logged.');
    setPendingMeal(null);
    setScreen('main');
    setTab('today');
  }

  // Post-meal adjustment (left some / only half)
  async function adjustLastMeal(mealId, multiplier) {
    const currentDayKey = today();
    setTodayKey(prev => prev === currentDayKey ? prev : currentDayKey);
    const updated = { ...allMeals };
    const dayMeals = [...(updated[currentDayKey] || [])];
    if (!dayMeals.length) return;
    const idx = mealId ? dayMeals.findIndex(m => m.id === mealId) : dayMeals.length - 1;
    const targetIdx = idx >= 0 ? idx : dayMeals.length - 1;
    const last = { ...dayMeals[targetIdx] };
    const updatedComponents = (last.components || []).map(c => {
      if (c?._baseNutrients) {
        const nextMult = (c._mult ?? c.portion_multiplier ?? 1) * multiplier;
        return hydrateComponent({ ...c, _mult: nextMult, _isUsual: false });
      }
      if (c?.nutrients) {
        return { ...c, _mult: (c._mult ?? c.portion_multiplier ?? 1) * multiplier, _isUsual: false, nutrients: scaleNutrientMap(c.nutrients, multiplier) };
      }
      return { ...c, _mult: (c._mult ?? c.portion_multiplier ?? 1) * multiplier, _isUsual: false };
    });
    const newTotals = updatedComponents.length ? sumNutrients(updatedComponents) : scaleNutrientMap(last.meal_totals, multiplier);
    last.components = updatedComponents;
    last.meal_totals = newTotals;
    last.post_meal_checked = true;
    last.post_meal_multiplier = multiplier;
    dayMeals[targetIdx] = last;
    updated[currentDayKey] = dayMeals;
    setAllMeals(updated);
    await storage.set('nouri:meals', updated);
    showToast('Updated!');
  }

  async function deleteMeal(mealId) {
    const updated = { ...allMeals };
    for (const key of Object.keys(updated)) {
      const dayMeals = updated[key] || [];
      const filtered = dayMeals.filter(m => m.id !== mealId);
      if (filtered.length !== dayMeals.length) {
        if (filtered.length === 0) delete updated[key];
        else updated[key] = filtered;
        break;
      }
    }
    setAllMeals(updated);
    await storage.set('nouri:meals', updated);
    showToast('Meal deleted');
  }

  // Save checkin
  async function saveCheckin(checkin) {
    const currentDayKey = today();
    setTodayKey(prev => prev === currentDayKey ? prev : currentDayKey);
    const full = { ...checkin, date: currentDayKey, timestamp: new Date().toISOString() };
    const updated = { ...allCheckins, [currentDayKey]: full };
    await storage.set('nouri:checkins', updated);
    setAllCheckins(updated);
  }

  // Save profile (from MeScreen / CalibrationScreen)
  async function saveProfile(p) {
    setProfile(p);
    await storage.set('nouri:profile', p);
  }

  // Save quick adds (from MeScreen)
  async function saveQuickAdds(qa) {
    const norm = (Array.isArray(qa) ? qa : []).map(normalizeQuickAdd);
    setQuickAdds(norm);
    await storage.set('nouri:quick-adds', norm);
  }

  const [viewingMeal, setViewingMeal] = React.useState(null);
  function handleViewMeal(meal) { setViewingMeal(meal); setScreen('mealView'); }
  function handleNav(nextTab) {
    if (nextTab === 'snap') setSnapInitialMode('camera');
    setTab(nextTab);
  }

  // Dismiss milestone
  function dismissMilestone() {
    setMilestoneQueue(q => q.slice(1));
  }

  if (screen === 'loading') return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#000000',height:'100dvh'}}>
      <div style={{textAlign:'center',padding:'0 32px',display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        {!initError ? (
          <>
            <svg width='72' height='72' viewBox='0 0 72 72' fill='none'>
              <circle cx='36' cy='36' r='30' stroke='rgba(255,255,255,0.04)' strokeWidth='5'/>
              <circle cx='36' cy='36' r='30' stroke='#3ECF8E' strokeWidth='5' strokeLinecap='round'
                strokeDasharray='130 58' strokeDashoffset='58' style={{animation:'spinRing 2s linear infinite',transformOrigin:'36px 36px'}}/>
              <circle cx='36' cy='36' r='20' stroke='rgba(255,255,255,0.04)' strokeWidth='3.5'/>
              <circle cx='36' cy='36' r='20' stroke='rgba(255,255,255,0.5)' strokeWidth='3.5' strokeLinecap='round'
                strokeDasharray='86 40' strokeDashoffset='40' style={{animation:'spinRing 2s linear infinite 0.4s',transformOrigin:'36px 36px'}}/>
              <circle cx='36' cy='36' r='11' stroke='rgba(255,255,255,0.04)' strokeWidth='2.5'/>
              <circle cx='36' cy='36' r='11' stroke='#F59E0B' strokeWidth='2.5' strokeLinecap='round'
                strokeDasharray='48 22' strokeDashoffset='22' style={{animation:'spinRing 2s linear infinite 0.8s',transformOrigin:'36px 36px'}}/>
            </svg>
            <div>
              <p style={{color:C.textPrimary,fontSize:22,fontWeight:700,letterSpacing:'-0.5px',margin:0}}>nouri</p>
              <p style={{color:'rgba(255,255,255,0.2)',fontSize:11,margin:'4px 0 0',letterSpacing:'0.3px'}}>Starting Nouri…</p>
            </div>
          </>
        ) : (
          <>
            <div style={{width:72,height:72,borderRadius:36,background:'rgba(255,107,107,0.1)',border:'1px solid rgba(255,107,107,0.2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
              <span style={{fontSize:32}}>⚠️</span>
            </div>
            <div>
              <p style={{color:C.textPrimary,fontSize:22,fontWeight:700,letterSpacing:'-0.5px',margin:0}}>nouri</p>
              <p style={{color:'rgba(255,100,100,0.9)',fontSize:13,margin:'12px 0 0',lineHeight:1.5,maxWidth:280,textAlign:'center'}}>{initError}</p>
            </div>
            <button onClick={runInit} style={{marginTop:8,padding:'12px 24px',background:'linear-gradient(135deg,#3ECF8E,#2BA874)',border:'none',borderRadius:12,color:'#000',fontSize:14,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>Try again</button>
          </>
        )}
      </div>
    </div>
  );

  if (screen === 'mealView' && viewingMeal) return (
    <MealViewScreen meal={viewingMeal} goals={goals} onBack={()=>{setViewingMeal(null);setScreen('main');}} onDelete={(id)=>{deleteMeal(id);setViewingMeal(null);setScreen('main');}}/>
  );
  if (screen === 'onboard' || (profile && !profile.onboarded)) return (
    <CalibrationScreen
      existingProfile={profile}
      onComplete={async (p) => { await saveProfile(p); setScreen('main'); }}
      onSkip={async () => {
        const p = { ...(profile||{}), onboarded: true };
        await saveProfile(p);
        setScreen('main');
      }}
    />
  );

  if (screen === 'calibrate') return (
    <CalibrationScreen
      existingProfile={profile}
      onComplete={async (p) => { await saveProfile(p); setScreen('main'); }}
      onSkip={() => setScreen('main')}
    />
  );

  if (screen === 'foodDetail' && pendingMeal) return (
    <FoodDetailScreen
      analysis={pendingMeal}
      sourceImage={pendingMeal.photo_data || null}
      goals={goals}
      todayTotals={todayTotals}
      onLog={logMeal}
      onRetakePhoto={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('camera'); }}
      onBack={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('camera'); }}
      onManualEntry={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('search'); }}
    />
  );

  // Main tabbed app

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#000000',color:'#fff',maxWidth:430,margin:'0 auto',position:'relative',overflow:'hidden'}}>
      {/* Screen content with fade transition */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:'auto',
        animation:'fadeIn 150ms ease-in-out',WebkitAnimation:'fadeIn 150ms ease-in-out'}}>

        {tab==='today' && (
          <TodayScreen
            profile={profile}
            goals={goals}
            meals={todayMeals}
            allMeals={allMeals}
            allCheckins={allCheckins}
            dayCount={Object.keys(allMeals).length}
            pendingMilestone={milestoneQueue[0] || null}
            onCheckinDone={saveCheckin}
            onMealAdjust={adjustLastMeal}
            onMilestoneDismiss={dismissMilestone}
            onViewMeal={handleViewMeal}
          />
        )}
        {tab==='snap' && (
          <SnapScreen
            profile={profile} onLogMeal={handleMealReady}
            quickAdds={quickAdds} learnedPortions={learnedPortions}
            initialMode={snapInitialMode}
          />
        )}
        {tab==='insights' && (
          <InsightsScreen profile={profile} allMeals={allMeals} allCheckins={allCheckins} goals={goals}/>
        )}
        {tab==='history' && (
          <HistoryScreen allMeals={allMeals} goals={goals} onViewMeal={handleViewMeal}/>
        )}
        {tab==='me' && (
          <MeScreen
            profile={profile}
            goals={goals}
            quickAdds={quickAdds}
            onSave={saveProfile}
            onRecalibrate={() => setScreen('calibrate')}
            onSaveQuickAdds={saveQuickAdds}
          />
        )}
      </div>

      <BottomNav active={tab} onNav={handleNav}/>

      {toast && <Toast message={toast}/>}

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        @keyframes scanLine {
          0%,100% { top: 10%; opacity: 1; }
          50% { top: 85%; opacity: 0.7; }
        }
        @keyframes pulse {
          0%,100% { transform: scale(1); opacity:1; }
          50% { transform: scale(1.08); opacity:0.85; }
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; background:#000; }
        input, textarea, button { font-family: inherit; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
