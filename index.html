            <button onClick={addItem} disabled={addLoading} style={{padding:"7px 14px",background:`linear-gradient(135deg,${C.green},${C.green2})`,border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>{addLoading?"Adding...":"Add"}</button>
          </div>
        )}

        {/* Cooking method */}
        <div style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
            <div style={{color:C.textVeryDim,fontSize:11}}>How was this cooked?</div>
            {components.length>1&&(
              <select value={methodTarget} onChange={e=>{const idx=Number(e.target.value);setMethodTarget(idx);setCookingMethod(components[idx]?.cooking_method||cookingMethod);}}
                style={{background:C.inputBg,border:`0.5px solid ${C.border}`,borderRadius:6,color:C.textDim,fontSize:11,padding:"2px 6px"}}>
                {components.map((c,i)=><option key={i} value={i}>{c.name}</option>)}
              </select>
            )}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {["grilled","baked","fried","steamed","raw","boiled","sauteed"].map(m=>(
              <button key={m} onClick={()=>applyMethod(m)} style={{padding:"10px 14px",borderRadius:16,border:`0.5px solid ${cookingMethod===m?"rgba(62,207,142,0.5)":"rgba(255,255,255,0.07)"}`,background:cookingMethod===m?"rgba(62,207,142,0.10)":"rgba(255,255,255,0.03)",color:cookingMethod===m?C.green:C.textDim,fontSize:12,fontWeight:500,cursor:"pointer",textTransform:"capitalize",transition:"all 0.15s ease",touchAction:"manipulation"}}>{m}</button>
            ))}
          </div>
          {methodChanged&&<div style={{color:C.textDim,fontSize:11,marginTop:5}}>Adjusted for {cookingMethod}{components.length>1?" ("+components[methodTarget]?.name+")":""}</div>}
        </div>

        {/* Portion cards */}
        {portionsExpanded&&components.map((comp,idx)=>{
          const refs=getPortionRefs(comp.category||"other");
          const isUsual=comp._isUsual;
          return(
            <div key={idx} style={{marginBottom:12}}>
              {isUsual&&<div style={{color:C.green,fontSize:11,marginBottom:4}}>Your usual portion</div>}
              <div style={{color:C.textDim,fontSize:12,marginBottom:6}}>{comp.name}</div>
              <div style={{display:"flex",gap:6}}>
                {refs.map(opt=>(
                  <button key={opt.l} onClick={()=>adjustPortion(idx,opt.m)} style={{flex:1,padding:"12px 4px",background:(comp._mult||1.0)===opt.m?C.greenDim:C.inputBg,border:`0.5px solid ${(comp._mult||1.0)===opt.m?C.green:C.border}`,borderRadius:8,color:(comp._mult||1.0)===opt.m?C.green:C.textDim,cursor:"pointer",textAlign:"center",touchAction:"manipulation"}}>
                    <div style={{fontSize:12,fontWeight:600}}>{opt.l}</div>
                    <div style={{fontSize:10,color:C.textVeryDim,marginTop:2}}>{opt.ref}</div>
                  </button>
                ))}
              </div>
            </div>
          );
        })}

        {/* Meal score */}
        <div style={{display:"flex",alignItems:"center",gap:14,background:`${sl.color}12`,border:`0.5px solid ${sl.color}33`,borderRadius:12,padding:"12px 16px",marginBottom:14}}>
          <div style={{width:56,height:56,borderRadius:28,background:`${sl.color}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <div style={{color:sl.color,fontSize:21,fontWeight:700,letterSpacing:"-0.5px"}}>{score.toFixed(1)}</div>
          </div>
          <div>
            <div style={{color:sl.color,fontSize:13,fontWeight:700}}>{sl.label}</div>
            <div style={{color:C.textDim,fontSize:11}}>Meal quality score</div>
          </div>
        </div>

        {/* Macros */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
          {[{k:"calories",l:"Cal",col:C.amber,u:""},{k:"protein_g",l:"Protein",col:C.green,u:"g"},{k:"carbs_g",l:"Carbs",col:C.blue,u:"g"},{k:"fat_g",l:"Fat",col:C.purple,u:"g"}].map(({k,l,col,u})=>(
            <div key={k} style={{background:`${col}0D`,border:`0.5px solid ${col}25`,borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <div style={{color:col,fontSize:19,fontWeight:700,letterSpacing:"-0.3px"}}>{Math.round(totals[k]||0)}{u}</div>
              <div style={{color:C.textDim,fontSize:10,textTransform:"uppercase",letterSpacing:"0.5px"}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Micronutrients */}
        <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style={{color:C.textVeryDim,fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>MICRONUTRIENTS</div>
          <div style={{color:C.textVeryDim,fontSize:10,marginBottom:10}}>Shows cumulative daily % including this meal</div>
          {(()=>{let lastArea=null;return topMicros.map(m=>{const showHeader=m.area&&m.area!==lastArea;if(m.area)lastArea=m.area;return(
            <div key={m.key}>
              {showHeader&&<div style={{color:C.textVeryDim,fontSize:10,fontWeight:700,marginTop:10,marginBottom:4}}>{m.areaIcon} {m.area}</div>}
              <NutrientBar label={m.label} value={(totals[m.key]||0)+(todayTotals?.[m.key]||0)} goal={goals?.[m.key]||DEFAULT_GOALS[m.key]} prevValue={todayTotals?.[m.key]||0} source={analysis.source} confidence={analysis.confidence} isVerified={analysis.components?.[0]?.reportedNutrients?.includes(m.key)} onTap={k=>setOpenTooltip(openTooltip===k?null:k)} nutrientKey={m.key}/>
              {openTooltip===m.key&&<NutrientTooltip nutrientKey={m.key} onClose={()=>setOpenTooltip(null)}/>}
            </div>
          );})})()}
          {showAll&&Object.entries(NUTRIENT_GROUPS).map(([group,keys])=>{
            const filtered=keys.filter(k=>!topMicroKeys.has(k));
            if(!filtered.length)return null;
            return(
            <div key={group}>
              <div style={{color:C.textVeryDim,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",margin:"10px 0 6px"}}>{group}</div>
              {filtered.map(k=>(
                <div key={k}>
                  <NutrientBar label={NUTRIENT_LABELS[k]} value={(totals[k]||0)+(todayTotals?.[k]||0)} goal={goals?.[k]||DEFAULT_GOALS[k]} prevValue={todayTotals?.[k]||0} source={analysis.source} confidence={analysis.confidence} isVerified={analysis.components?.[0]?.reportedNutrients?.includes(k)} onTap={k2=>setOpenTooltip(openTooltip===k2?null:k2)} nutrientKey={k}/>
                  {openTooltip===k&&<NutrientTooltip nutrientKey={k}/>}
                </div>
              ))}
            </div>
            );
          })}
          <button onClick={()=>setShowAll(!showAll)} style={{background:"none",border:"none",color:"rgba(96,165,250,0.75)",fontSize:12,cursor:"pointer",marginTop:8,padding:"12px 0",letterSpacing:"0.1px",touchAction:"manipulation"}}>{showAll?"Show less":"Show all 30+ nutrients"}</button>
        </div>
        <div style={{color:C.textVeryDim,fontSize:11,textAlign:"center",marginBottom:16}}>
          {analysis.source==="barcode"?"✓ Verified manufacturer data":analysis.hand_detected?"✓ High confidence — hand scale used":"~ AI-estimated values"}
        </div>

      </div>
    </div>
  );
}

// ── SnapScreen ──────────────────────────────────────────────────────────────
function SnapScreen({ profile, onLogMeal, quickAdds, learnedPortions, initialMode }) {
  const [mode, setMode] = React.useState(initialMode || 'camera'); // camera | search | barcode
  const [stream, setStream] = React.useState(null);
  const [captured, setCaptured] = React.useState(null);
  const [analyzing, setAnalyzing] = React.useState(false);
  const [analysisStep, setAnalysisStep] = React.useState(0);
  const [searchText, setSearchText] = React.useState('');
  const [barcodeInput, setBarcodeInput] = React.useState('');
  const [error, setError] = React.useState('');
  const videoRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const barcodeDetectorRef = React.useRef(null);
  const fileInputRef = React.useRef(null);
  const scanIntervalRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const [showManualBarcode, setShowManualBarcode] = React.useState(false);

  const ANALYSIS_STEPS = ['Identifying foods...','Estimating portions...','Calculating nutrients...','Almost done...'];

  React.useEffect(() => {
    setMode(initialMode || 'camera');
    setCaptured(null);
    setSearchText('');
    setBarcodeInput('');
    setError('');
    setShowManualBarcode(false);
  }, [initialMode]);

  function stopStream() {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setStream(null);
  }

  React.useEffect(() => {
    const supportsBarcodeScanning = mode === 'barcode' && ("BarcodeDetector" in window);
    if (mode === 'camera' || supportsBarcodeScanning) {
      startCamera();
    } else {
      stopStream();
    }
    if (mode === 'barcode' && !("BarcodeDetector" in window)) {
      setShowManualBarcode(true);
    } else if (mode !== 'barcode') {
      setShowManualBarcode(false);
    }
    return () => { stopStream(); };
  }, [mode]);

  // BarcodeDetector scanning effect
  React.useEffect(() => {
    if (mode === 'barcode' && stream && videoRef.current) {
      if ('BarcodeDetector' in window) {
        barcodeDetectorRef.current = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128'] });
        scanIntervalRef.current = setInterval(async () => {
          if (videoRef.current && videoRef.current.readyState === 4 && !analyzing) {
            try {
              const codes = await barcodeDetectorRef.current.detect(videoRef.current);
              if (codes.length > 0) {
                clearInterval(scanIntervalRef.current);
                setBarcodeInput(codes[0].rawValue);
                analyzeBarcodeCode(codes[0].rawValue);
              }
            } catch {}
          }
        }, 300);
      }
    }
    return () => { if (scanIntervalRef.current) clearInterval(scanIntervalRef.current); };
  }, [mode, stream, analyzing]);

  React.useEffect(() => {
    let interval;
    if (analyzing) {
      interval = setInterval(() => {
        setAnalysisStep(s => (s + 1) % ANALYSIS_STEPS.length);
      }, 2000);
    }
    return () => clearInterval(interval);
  }, [analyzing]);

  async function startCamera() {
    stopStream();
    try {
      const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' }, audio: false });
      streamRef.current = s;
      setStream(s);
      if (videoRef.current) videoRef.current.srcObject = s;
    } catch(e) { setError('Camera access denied. Use search instead.'); }
  }

  function capturePhoto() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas) return;
    const MAX = 1024;
    let w = video.videoWidth, h = video.videoHeight;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
    stopStream();
    setCaptured(dataUrl);
  }

  function handleGallerySelect(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const resized = await resizeImage(reader.result);
        setCaptured(`data:image/jpeg;base64,${resized}`);
        stopStream();
      } catch(err) { setError('Could not load image'); }
    };
    reader.readAsDataURL(file);
  }

  async function analyzePhoto() {
    if (!captured) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await analyzeFood({
        imageBase64: captured.split(',')[1],
        palmWidth: profile?.hand_calibrated ? profile.palm_width_inches : null,
        palmLength: profile?.hand_calibrated ? profile.palm_length_inches : null,
      });
      result.source = 'meal';
      result.photo_data = captured;
      // attach learned portions
      result.components = (result.components || []).map(c => {
        const key = c.name.toLowerCase().trim();
        const learned = learnedPortions[key];
        if (learned && learned.count >= 3) return { ...c, learnedMultiplier: learned.avgMultiplier };
        return c;
      });
      onLogMeal(result);
    } catch(e) { setError('Analysis failed. Try again or use search.'); }
    finally { setAnalyzing(false); }
  }

  async function analyzeSearch() {
    if (!searchText.trim()) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await analyzeFood({ text: searchText });
      result.source = 'search';
      result.components = (result.components || []).map(c => {
        const key = c.name.toLowerCase().trim();
        const learned = learnedPortions[key];
        if (learned && learned.count >= 3) return { ...c, learnedMultiplier: learned.avgMultiplier };
        return c;
      });
      onLogMeal(result);
    } catch(e) { setError('Search failed. Please try again.'); }
    finally { setAnalyzing(false); }
  }

  async function analyzeBarcodeCode(directCode) {
    const code = directCode || barcodeInput.trim();
    if (!code) return;
    setAnalyzing(true); setAnalysisStep(0); setError('');
    try {
      const result = await lookupBarcode(code);
      if (!result) { setError('Product not found. Try searching manually.'); setAnalyzing(false); return; }
      result.source = 'barcode';
      onLogMeal(result);
    } catch(e) { setError('Barcode not found. Try searching manually.'); }
    finally { setAnalyzing(false); }
  }
  const analyzeBarcode = () => analyzeBarcodeCode();

  function tapQuickAdd(qa) {
    const label = qa.label || qa.name || "Quick Add";
    const nutrients = { ...Object.fromEntries(Object.keys(DEFAULT_GOALS).map(k=>[k,0])), ...(qa.nutrients||{}) };
    const meal = {
      id: Date.now().toString(),
      timestamp: new Date().toISOString(),
      meal_name: label,
      source: 'quick',
      components: [{ name: label, _mult: 1, category: 'other', confidence: 'quick', nutrients }],
      meal_totals: nutrients,
      photo_data: null,
      confidence: 1.0,
    };
    onLogMeal(meal, true);
  }

  if (analyzing) return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#000000',color:'#fff',gap:16,padding:32}}>
      <div style={{width:60,height:60,border:'3px solid #3ECF8E',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite'}}/>
      <p style={{color:'#3ECF8E',fontSize:17,fontWeight:600,margin:0,animation:'fadeIn 0.3s ease'}}>{ANALYSIS_STEPS[analysisStep]}</p>
      <p style={{color:'rgba(255,255,255,0.2)',fontSize:13,margin:0}}>Powered by AI</p>
    </div>
  );

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',background:'#000000',overflow:'hidden'}}>
      {/* Mode toggle */}
      <div style={{padding:"16px 20px 8px",background:"#000000"}}>
        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:20,padding:3,display:"flex"}}>
          {[['camera','Snap'],['barcode','Barcode'],['search','Search']].map(([m,label]) => (
            <button key={m} onClick={()=>{ setMode(m); setCaptured(null); setError(''); }}
              style={{flex:1,padding:"9px 0",borderRadius:17,background:mode===m?"#3ECF8E":"transparent",border:"none",color:mode===m?"#000":"rgba(255,255,255,0.3)",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s ease"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {error && <div style={{background:'#1a0000',color:'#f87171',padding:'10px 16px',fontSize:13}}>{error}</div>}

      {/* Camera mode */}
      {mode==='camera' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#000000'}}>
          {!captured ? (
            <>
              <video ref={videoRef} autoPlay playsInline muted style={{flex:1,objectFit:'cover',width:'100%'}}/>
              <canvas ref={canvasRef} style={{display:'none'}}/>
              {/* Cinematic overlay */}
              <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                {/* Corner brackets */}
                <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-55%)',width:230,height:230}}>
                  <div style={{position:'absolute',top:0,left:0,width:22,height:22,borderTop:'2px solid #3ECF8E',borderLeft:'2px solid #3ECF8E',borderRadius:'3px 0 0 0'}}/>
                  <div style={{position:'absolute',top:0,right:0,width:22,height:22,borderTop:'2px solid #3ECF8E',borderRight:'2px solid #3ECF8E',borderRadius:'0 3px 0 0'}}/>
                  <div style={{position:'absolute',bottom:0,left:0,width:22,height:22,borderBottom:'2px solid #3ECF8E',borderLeft:'2px solid #3ECF8E',borderRadius:'0 0 0 3px'}}/>
                  <div style={{position:'absolute',bottom:0,right:0,width:22,height:22,borderBottom:'2px solid #3ECF8E',borderRight:'2px solid #3ECF8E',borderRadius:'0 0 3px 0'}}/>
                  <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',color:'rgba(255,255,255,0.45)',fontSize:13,fontWeight:500,textAlign:'center',whiteSpace:'nowrap'}}>Point at your meal</div>
                </div>
                <div style={{position:'absolute',bottom:116,left:0,right:0,textAlign:'center',color:'rgba(255,255,255,0.22)',fontSize:11}}>AI identifies food and estimates portions</div>
                {profile?.hand_calibrated&&<div style={{position:'absolute',top:20,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.55)',backdropFilter:'blur(8px)',borderRadius:20,padding:'5px 14px',color:'rgba(255,255,255,0.4)',fontSize:11,whiteSpace:'nowrap'}}>Tip: rest your hand near the plate</div>}
              </div>
              {/* Shutter + Gallery */}
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleGallerySelect}/>
              <div style={{position:'absolute',bottom:100,left:0,right:0,display:'flex',justifyContent:'center',alignItems:'center',gap:28,zIndex:200}}>
                <button onClick={()=>fileInputRef.current?.click()} style={{width:44,height:44,borderRadius:22,background:'rgba(255,255,255,0.12)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',touchAction:'manipulation'}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </button>
                <button onClick={capturePhoto} style={{width:72,height:72,borderRadius:'50%',background:'#ffffff',border:'none',cursor:'pointer',boxShadow:'0 0 0 5px rgba(255,255,255,0.15)',outline:'none',WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}/>
                <div style={{width:44}}/>
              </div>
            </>
          ) : (
            <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative'}}>
              <img src={captured} style={{flex:1,objectFit:'cover',width:'100%'}}/>
              <div style={{position:'absolute',bottom:0,left:0,right:0,display:'flex',gap:12,padding:'16px 16px 110px',background:'linear-gradient(to top,rgba(0,0,0,0.95) 60%,transparent)',zIndex:200}}>
                <button onClick={()=>{ setCaptured(null); startCamera(); }}
                  style={{flex:1,padding:'15px 0',background:'rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.75)',border:'none',borderRadius:12,fontSize:15,fontWeight:600,cursor:'pointer',touchAction:'manipulation'}}>
                  Retake
                </button>
                <button onClick={analyzePhoto}
                  style={{flex:2,padding:'15px 0',background:'#3ECF8E',color:'#000',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 0 16px rgba(62,207,142,0.3)',touchAction:'manipulation'}}>
                  Analyze →
                </button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Search mode */}
      {mode==='search' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',padding:"20px",gap:14,background:"#000000"}}>
          <textarea
            value={searchText} onChange={e=>setSearchText(e.target.value)}
            placeholder="Describe your meal — e.g. grilled chicken with broccoli and rice"
            rows={4}
            style={{background:'rgba(255,255,255,0.06)',border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:12,color:'#fff',padding:14,fontSize:14,resize:'none',outline:'none'}}
          />
          <button onClick={analyzeSearch} disabled={!searchText.trim()}
            style={{padding:'14px 0',background:searchText.trim()?'#3ECF8E':'rgba(255,255,255,0.06)',color:searchText.trim()?'#000':'rgba(255,255,255,0.25)',
              border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:searchText.trim()?'pointer':'default',
              boxShadow:searchText.trim()?'0 0 16px rgba(62,207,142,0.25)':'none',transition:'all 0.15s ease'}}>
            Analyze →
          </button>
          <div>
            <p style={{color:'rgba(255,255,255,0.25)',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'1.5px',margin:'4px 0 10px'}}>Quick Add</p>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {quickAdds.map((qa,i) => (
                <button key={i} onClick={()=>tapQuickAdd(qa)}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'rgba(255,255,255,0.04)',
                    border:'0.5px solid rgba(255,255,255,0.08)',borderRadius:20,color:'rgba(255,255,255,0.75)',fontSize:13,cursor:'pointer'}}>
                  <span>{qa.emoji}</span><span>{qa.label || qa.name}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Barcode mode */}
      {mode==='barcode' && (
        <div style={{flex:1,display:'flex',flexDirection:'column',position:'relative',background:'#000000'}}>
          {'BarcodeDetector' in window ? (
            <>
              {/* Camera viewfinder */}
              <video ref={videoRef} autoPlay playsInline muted style={{flex:1,objectFit:'cover',width:'100%'}}/>
              {/* Scanning line animation */}
              <div style={{position:'absolute',inset:0,pointerEvents:'none'}}>
                <div style={{position:'absolute',left:'10%',right:'10%',top:'20%',bottom:'20%',
                  border:'1px solid rgba(62,207,142,0.3)',borderRadius:12}}>
                  <div style={{position:'absolute',left:0,right:0,height:2,background:'#3ECF8E',
                    animation:'scanLine 1.8s ease-in-out infinite',top:'50%'}}/>
                </div>
              </div>
              <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(to top,rgba(0,0,0,0.9),rgba(0,0,0,0))',
                padding:'14px 20px 110px',display:'flex',flexDirection:'column',gap:10,alignItems:'center',zIndex:200}}>
                <p style={{color:'#3ECF8E',fontSize:14,fontWeight:600,margin:0,letterSpacing:'-0.1px'}}>Scanning for barcode...</p>
                <button onClick={()=>setShowManualBarcode(s=>!s)}
                  style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:12,cursor:'pointer'}}>
                  {showManualBarcode ? 'Hide manual entry' : 'Or type barcode manually'}
                </button>
                {showManualBarcode && (
                  <div style={{display:'flex',gap:8,width:'100%'}}>
                    <input type='number' value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)}
                      placeholder='e.g. 012345678905'
                      style={{flex:1,background:'rgba(255,255,255,0.08)',border:'0.5px solid rgba(255,255,255,0.1)',borderRadius:10,
                        color:'#fff',padding:'10px 12px',fontSize:14,outline:'none'}}/>
                    <button onClick={analyzeBarcode} disabled={!barcodeInput.trim()}
                      style={{padding:'10px 16px',background:barcodeInput.trim()?'#3ECF8E':'rgba(255,255,255,0.06)',
                        color:barcodeInput.trim()?'#000':'rgba(255,255,255,0.3)',border:'none',borderRadius:10,
                        fontSize:14,fontWeight:700,cursor:barcodeInput.trim()?'pointer':'default'}}>
                      Go
                    </button>
                  </div>
                )}
              </div>
            </>
          ) : (
            /* Fallback: no BarcodeDetector (Safari) */
            <div style={{flex:1,display:'flex',flexDirection:'column',padding:20,gap:16}}>
              <p style={{color:'#aaa',fontSize:14,margin:0}}>Camera scanning works best in Chrome. Enter barcode number below.</p>
              <input type='number' value={barcodeInput} onChange={e=>setBarcodeInput(e.target.value)}
                placeholder='e.g. 012345678905'
                style={{background:'rgba(255,255,255,0.06)',border:'1px solid #333',borderRadius:12,color:'#fff',padding:14,fontSize:16}}/>
              <button onClick={analyzeBarcode} disabled={!barcodeInput.trim()}
                style={{padding:'14px 0',background:barcodeInput.trim()?'#3ECF8E':'rgba(255,255,255,0.06)',
                  color:barcodeInput.trim()?'#000':'rgba(255,255,255,0.3)',border:'none',borderRadius:12,
                  fontSize:16,fontWeight:700,cursor:barcodeInput.trim()?'pointer':'default'}}>
                Look Up →
              </button>
              <p style={{color:'#555',fontSize:12,textAlign:'center',margin:0}}>Barcode data from Open Food Facts.</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Goals helper ─────────────────────────────────────────────────────────────
function computeGoals(profile) {
  if (!profile) return { ...DEFAULT_GOALS };
  const base = profile.goal_preset === 'high_protein' ? { ...HIGH_PROTEIN_GOALS } : { ...DEFAULT_GOALS };
  // Always merge saved profile.goals so custom edits are respected
  return { ...base, ...(profile.goals || {}) };
}

// ── App Root ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState('loading');
  const [initError, setInitError] = React.useState(null);
  const [profile, setProfile] = React.useState(null);
  const [pendingMeal, setPendingMeal] = React.useState(null);
  const [tab, setTab] = React.useState('today');
  const [snapInitialMode, setSnapInitialMode] = React.useState('camera');
  const [toast, setToast] = React.useState('');
  const [allMeals, setAllMeals] = React.useState({});
  const [allCheckins, setAllCheckins] = React.useState({});
  const [learnedPortions, setLearnedPortions] = React.useState({});
  const [quickAdds, setQuickAdds] = React.useState(DEFAULT_QUICK_ADDS);
  const [milestoneQueue, setMilestoneQueue] = React.useState([]);
  const toastTimerRef = React.useRef(null);
  const [todayKey, setTodayKey] = React.useState(() => today());
  React.useEffect(() => () => { if (toastTimerRef.current) clearTimeout(toastTimerRef.current); }, []);
  React.useEffect(() => {
    const syncTodayKey = () => {
      const next = today();
      setTodayKey(prev => prev === next ? prev : next);
    };
    syncTodayKey();
    const interval = setInterval(syncTodayKey, 60000);
    return () => clearInterval(interval);
  }, []);

  // Load all data on mount
  React.useEffect(() => {
    async function init() {
      let profileData = null;
      try {
        const [p, meals, checkins, learned, qa] = await Promise.all([
          storage.get('nouri:profile'),
          storage.get('nouri:meals'),
          storage.get('nouri:checkins'),
          storage.get('nouri:learned-portions'),
          storage.get('nouri:quick-adds'),
        ]);
        profileData = p;
        if (p) setProfile(p);
        if (meals) setAllMeals(meals);
        if (checkins) setAllCheckins(checkins);
        if (learned) setLearnedPortions(learned);
        if (Array.isArray(qa)) setQuickAdds(qa.map(normalizeQuickAdd));
      } catch(e) {
        setInitError(String(e));
      } finally {
        setScreen(profileData && profileData.onboarded ? 'main' : 'onboard');
      }
    }
    init();
  }, []);

  function showToast(msg) {
    setToast(msg);
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(''), 2500);
  }

  const todayMeals = allMeals[todayKey] || [];

  function computeTotals(meals) {
    const totals = {};
    meals.forEach(m => {
      Object.keys(m.meal_totals || {}).forEach(k => {
        totals[k] = (totals[k] || 0) + (m.meal_totals[k] || 0);
      });
    });
    return totals;
  }
  const todayTotals = computeTotals(todayMeals);
  const goals = profile ? computeGoals(profile) : { ...DEFAULT_GOALS };

  // Called from SnapScreen: meal either goes to FoodDetail or logs directly (quick adds)
  function handleMealReady(meal, directLog = false) {
    if (directLog) {
      logMeal(meal);
    } else {
      setPendingMeal(meal);
      setScreen('foodDetail');
    }
  }

  // Called from FoodDetailScreen: logMeal(components, totals, false)
  // Called from quick-add path: logMeal(mealObj)
  async function logMeal(componentsOrMeal, totalsArg, _fromDetail) {
    let meal;
    if (Array.isArray(componentsOrMeal)) {
      // FoodDetailScreen signature: (components[], totals{}, bool)
      const rawPhoto = pendingMeal?.photo_data;
      // Strip data URL prefix so MealEntry can re-add it
      const photoBase64 = rawPhoto && rawPhoto.startsWith('data:') ? rawPhoto.split(',')[1] : rawPhoto;
      meal = {
        id: Date.now().toString(),
        timestamp: new Date().toISOString(),
        meal_name: pendingMeal ? (pendingMeal.meal_name || 'Meal') : 'Meal',
        source: pendingMeal ? pendingMeal.source : 'meal',
        confidence: pendingMeal ? pendingMeal.confidence : 0.9,
        hand_detected: pendingMeal ? pendingMeal.hand_detected : false,
        photo_data: photoBase64 || null,
        components: componentsOrMeal,
        meal_totals: totalsArg,
      };
    } else {
      meal = componentsOrMeal;
      if (!meal.id) meal.id = Date.now().toString();
      if (!meal.timestamp) meal.timestamp = new Date().toISOString();
    }
    const dateKey = meal.timestamp ? localDateKey(new Date(meal.timestamp)) : todayKey;
    setTodayKey(prev => prev === dateKey ? prev : dateKey);
    const updated = { ...allMeals };
    if (!updated[dateKey]) updated[dateKey] = [];

    // Assign id if missing
    if (!meal.id) meal.id = Date.now().toString();
    updated[dateKey] = [...updated[dateKey], meal];

    setAllMeals(updated);
    await storage.set('nouri:meals', updated);

    // Update learned portions
    const newLearned = { ...learnedPortions };
    (meal.components || []).forEach(c => {
      const key = c.name.toLowerCase().trim();
      const m = c._mult || c.portion_multiplier || 1;
      if (!newLearned[key]) newLearned[key] = { count: 0, avgMultiplier: m, lastUsed: dateKey };
      const prev = newLearned[key];
      const newCount = prev.count + 1;
      newLearned[key] = {
        count: newCount,
        avgMultiplier: (prev.avgMultiplier * prev.count + m) / newCount,
        lastUsed: dateKey,
      };
    });
    setLearnedPortions(newLearned);
    await storage.set('nouri:learned-portions', newLearned);

    // Update streak + check milestones
    const updatedProfile = updateStreak({ ...profile });
    const allDayMeals = updated[dateKey];
    const totalMeals = Object.values(updated).reduce((s, arr) => s + arr.length, 0);
    const newMilestones = checkMilestones(updatedProfile, totalMeals);
    if (newMilestones.length) {
      if (!updatedProfile.milestones_shown) updatedProfile.milestones_shown = [];
      newMilestones.forEach(ms => updatedProfile.milestones_shown.push(ms.id));
      setMilestoneQueue(q => [...q, ...newMilestones]);
    }
    setProfile(updatedProfile);
    await storage.set('nouri:profile', updatedProfile);

    showToast('Meal logged!');
    setPendingMeal(null);
    setScreen('main');
    setTab('today');
  }

  // Post-meal adjustment (left some / only half)
  async function adjustLastMeal(mealId, multiplier) {
    const currentDayKey = today();
    setTodayKey(prev => prev === currentDayKey ? prev : currentDayKey);
    const updated = { ...allMeals };
    const dayMeals = [...(updated[currentDayKey] || [])];
    if (!dayMeals.length) return;
    const idx = mealId ? dayMeals.findIndex(m => m.id === mealId) : dayMeals.length - 1;
    const targetIdx = idx >= 0 ? idx : dayMeals.length - 1;
    const last = { ...dayMeals[targetIdx] };
    const updatedComponents = (last.components || []).map(c => {
      if (c?._baseNutrients) {
        const nextMult = (c._mult ?? c.portion_multiplier ?? 1) * multiplier;
        return hydrateComponent({ ...c, _mult: nextMult, _isUsual: false });
      }
      if (c?.nutrients) {
        return { ...c, _mult: (c._mult ?? c.portion_multiplier ?? 1) * multiplier, _isUsual: false, nutrients: scaleNutrientMap(c.nutrients, multiplier) };
      }
      return { ...c, _mult: (c._mult ?? c.portion_multiplier ?? 1) * multiplier, _isUsual: false };
    });
    const newTotals = updatedComponents.length ? sumNutrients(updatedComponents) : scaleNutrientMap(last.meal_totals, multiplier);
    last.components = updatedComponents;
    last.meal_totals = newTotals;
    last.post_meal_checked = true;
    last.post_meal_multiplier = multiplier;
    dayMeals[targetIdx] = last;
    updated[currentDayKey] = dayMeals;
    setAllMeals(updated);
    await storage.set('nouri:meals', updated);
    showToast('Updated!');
  }

  async function deleteMeal(mealId) {
    const updated = { ...allMeals };
    for (const key of Object.keys(updated)) {
      const dayMeals = updated[key] || [];
      const filtered = dayMeals.filter(m => m.id !== mealId);
      if (filtered.length !== dayMeals.length) {
        if (filtered.length === 0) delete updated[key];
        else updated[key] = filtered;
        break;
      }
    }
    setAllMeals(updated);
    await storage.set('nouri:meals', updated);
    showToast('Meal deleted');
  }

  // Save checkin
  async function saveCheckin(checkin) {
    const currentDayKey = today();
    setTodayKey(prev => prev === currentDayKey ? prev : currentDayKey);
    const full = { ...checkin, date: currentDayKey, timestamp: new Date().toISOString() };
    const updated = { ...allCheckins, [currentDayKey]: full };
    await storage.set('nouri:checkins', updated);
    setAllCheckins(updated);
  }

  // Save profile (from MeScreen / CalibrationScreen)
  async function saveProfile(p) {
    setProfile(p);
    await storage.set('nouri:profile', p);
  }

  // Save quick adds (from MeScreen)
  async function saveQuickAdds(qa) {
    const norm = (Array.isArray(qa) ? qa : []).map(normalizeQuickAdd);
    setQuickAdds(norm);
    await storage.set('nouri:quick-adds', norm);
  }

  const [viewingMeal, setViewingMeal] = React.useState(null);
  function handleViewMeal(meal) { setViewingMeal(meal); setScreen('mealView'); }
  function handleNav(nextTab) {
    if (nextTab === 'snap') setSnapInitialMode('camera');
    setTab(nextTab);
  }

  // Dismiss milestone
  function dismissMilestone() {
    setMilestoneQueue(q => q.slice(1));
  }

  if (screen === 'loading') return (
    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',background:'#000000',height:'100dvh'}}>
      <div style={{textAlign:'center',padding:'0 32px',display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
        <svg width='72' height='72' viewBox='0 0 72 72' fill='none'>
          <circle cx='36' cy='36' r='30' stroke='rgba(255,255,255,0.04)' strokeWidth='5'/>
          <circle cx='36' cy='36' r='30' stroke='#3ECF8E' strokeWidth='5' strokeLinecap='round'
            strokeDasharray='130 58' strokeDashoffset='58' style={{animation:'spinRing 2s linear infinite',transformOrigin:'36px 36px'}}/>
          <circle cx='36' cy='36' r='20' stroke='rgba(255,255,255,0.04)' strokeWidth='3.5'/>
          <circle cx='36' cy='36' r='20' stroke='rgba(255,255,255,0.5)' strokeWidth='3.5' strokeLinecap='round'
            strokeDasharray='86 40' strokeDashoffset='40' style={{animation:'spinRing 2s linear infinite 0.4s',transformOrigin:'36px 36px'}}/>
          <circle cx='36' cy='36' r='11' stroke='rgba(255,255,255,0.04)' strokeWidth='2.5'/>
          <circle cx='36' cy='36' r='11' stroke='#F59E0B' strokeWidth='2.5' strokeLinecap='round'
            strokeDasharray='48 22' strokeDashoffset='22' style={{animation:'spinRing 2s linear infinite 0.8s',transformOrigin:'36px 36px'}}/>
        </svg>
        <div>
          <p style={{color:'#FFFFFF',fontSize:22,fontWeight:700,letterSpacing:'-0.5px',margin:0}}>nouri</p>
          <p style={{color:'rgba(255,255,255,0.2)',fontSize:11,margin:'4px 0 0',letterSpacing:'0.3px'}}>{initError?'Error loading':'Loading...'}</p>
        </div>
        {initError&&<p style={{color:'rgba(255,100,100,0.7)',fontSize:12,lineHeight:1.5,maxWidth:240,textAlign:'center'}}>{initError}</p>}
      </div>
    </div>
  );

  if (screen === 'mealView' && viewingMeal) return (
    <MealViewScreen meal={viewingMeal} goals={goals} onBack={()=>{setViewingMeal(null);setScreen('main');}} onDelete={(id)=>{deleteMeal(id);setViewingMeal(null);setScreen('main');}}/>
  );
  if (screen === 'onboard' || (profile && !profile.onboarded)) return (
    <CalibrationScreen
      existingProfile={profile}
      onComplete={async (p) => { await saveProfile(p); setScreen('main'); }}
      onSkip={async () => {
        const p = { ...(profile||{}), onboarded: true };
        await saveProfile(p);
        setScreen('main');
      }}
    />
  );

  if (screen === 'calibrate') return (
    <CalibrationScreen
      existingProfile={profile}
      onComplete={async (p) => { await saveProfile(p); setScreen('main'); }}
      onSkip={() => setScreen('main')}
    />
  );

  if (screen === 'foodDetail' && pendingMeal) return (
    <FoodDetailScreen
      analysis={pendingMeal}
      sourceImage={pendingMeal.photo_data || null}
      goals={goals}
      todayTotals={todayTotals}
      onLog={logMeal}
      onRetakePhoto={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('camera'); }}
      onBack={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('camera'); }}
      onManualEntry={() => { setPendingMeal(null); setScreen('main'); setTab('snap'); setSnapInitialMode('search'); }}
    />
  );

  // Main tabbed app

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100dvh',background:'#000000',color:'#fff',maxWidth:430,margin:'0 auto',position:'relative',overflow:'hidden'}}>
      {/* Screen content with fade transition */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:'auto',
        animation:'fadeIn 150ms ease-in-out',WebkitAnimation:'fadeIn 150ms ease-in-out'}}>

        {tab==='today' && (
          <TodayScreen
            profile={profile}
            goals={goals}
            meals={todayMeals}
            allMeals={allMeals}
            allCheckins={allCheckins}
            dayCount={Object.keys(allMeals).length}
            pendingMilestone={milestoneQueue[0] || null}
            onCheckinDone={saveCheckin}
            onMealAdjust={adjustLastMeal}
            onMilestoneDismiss={dismissMilestone}
            onViewMeal={handleViewMeal}
          />
        )}
        {tab==='snap' && (
          <SnapScreen
            profile={profile} onLogMeal={handleMealReady}
            quickAdds={quickAdds} learnedPortions={learnedPortions}
            initialMode={snapInitialMode}
          />
        )}
        {tab==='insights' && (
          <InsightsScreen profile={profile} allMeals={allMeals} allCheckins={allCheckins} goals={goals}/>
        )}
        {tab==='history' && (
          <HistoryScreen allMeals={allMeals} goals={goals} onViewMeal={handleViewMeal}/>
        )}
        {tab==='me' && (
          <MeScreen
            profile={profile}
            goals={goals}
            quickAdds={quickAdds}
            onSave={saveProfile}
            onRecalibrate={() => setScreen('calibrate')}
            onSaveQuickAdds={saveQuickAdds}
          />
        )}
      </div>

      <BottomNav active={tab} onNav={handleNav}/>

      {toast && <Toast message={toast}/>}

      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes shimmer {
          0% { background-position: -200% 0; }
          100% { background-position: 200% 0; }
        }
        @keyframes scanLine {
          0%,100% { top: 10%; opacity: 1; }
          50% { top: 85%; opacity: 0.7; }
        }
        @keyframes pulse {
          0%,100% { transform: scale(1); opacity:1; }
          50% { transform: scale(1.08); opacity:0.85; }
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin:0; background:#000; }
        input, textarea, button { font-family: inherit; }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
