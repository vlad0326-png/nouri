function localDateKey(date=new Date()){const y=date.getFullYear();const mo=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');return `${y}-${mo}-${d}`;}

const pct=(val,goal)=>goal>0?Math.min(100,(val/goal)*100):0;

function sumNutrients(components){
  const t={};Object.keys(DEFAULT_GOALS).forEach(k=>{t[k]=0;});
  (components||[]).forEach(c=>{if(c.nutrients)Object.keys(c.nutrients).forEach(k=>{if(t[k]!==undefined)t[k]+=(c.nutrients[k]||0);});});
  return t;
}

function scaleNutrientMap(nutrients,multiplier){
  const scaled={};
  Object.keys(nutrients||{}).forEach(k=>{scaled[k]=(nutrients[k]||0)*multiplier;});
  return scaled;
}

function parseServingAmountGrams(servingSize){
  if(!servingSize)return null;
  const raw=String(servingSize).trim().toLowerCase();
  const matches=[
    {re:/(\d+(?:[.,]\d+)?)\s*(kg|kilogram|kilograms)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(g|gram|grams)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(l|liter|liters)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(ml|milliliter|milliliters)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(fl\s*oz|fluid ounce|fluid ounces)\b/,mult:29.5735},
    {re:/(\d+(?:[.,]\d+)?)\s*(oz|ounce|ounces)\b/,mult:28.3495},
  ];
  for(const {re,mult} of matches){
    const match=raw.match(re);
    if(match)return Math.round(parseFloat(match[1].replace(",", "."))*mult*10)/10;
  }
  return null;
}

function resizeImage(dataUrl,maxPx=1024){
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>{
      const scale=Math.min(1,maxPx/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };img.src=dataUrl;
  });
}

function toImageSrc(imageData){
  if(!imageData)return null;
  return imageData.startsWith("data:") ? imageData : `data:image/jpeg;base64,${imageData}`;
}

function mealScore(mealTotals, goals){
  const keys=Object.keys(goals).filter(k=>goals[k]>0);
  let hits=0;keys.forEach(k=>{if((mealTotals[k]||0)/goals[k]>=0.15)hits++;});
  return Math.round((hits/keys.length)*100)/10;
}

function scoreLabel(s){
  if(s>=8.0)return{label:"Excellent",color:C.green};
  if(s>=6.0)return{label:"Good",color:C.blue};
  if(s>=4.0)return{label:"Fair",color:C.amber};
  return{label:"Light",color:C.textTertiary};
}

function updateStreak(profile){
  const ld=profile.last_logged_date;
  const t=today();
  if(ld===t)return profile;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yestStr=localDateKey(yest);
  let streak=ld===yestStr?(profile.current_streak||0)+1:1;
  const best=Math.max(streak,profile.best_streak||0);
  return{...profile,current_streak:streak,best_streak:best,last_logged_date:t};
}

}

// Animated Number Counter
function AnimatedNumber({ value, duration = 600, decimals = 0 }) {
  const [displayValue, setDisplayValue] = useState(0);
  const prevValue = useRef(0);
  
  useEffect(() => {
    const start = prevValue.current;
    const end = value;
    const startTime = performance.now();
    
    const animate = (currentTime) => {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = start + (end - start) * eased;
      setDisplayValue(current);
      
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        prevValue.current = end;
      }
    };
    
    requestAnimationFrame(animate);
  }, [value, duration]);
  
  return decimals > 0 ? displayValue.toFixed(decimals) : Math.round(displayValue);
}

// Premium Progress Ring
function ProgressRing({ progress, size = 120, strokeWidth = 6, color = C.green, showGlow = true, children }) {
  const radius = (size - strokeWidth) / 2;
  const circumference = radius * 2 * Math.PI;
  const offset = circumference - (Math.min(progress, 100) / 100) * circumference;
  
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        {/* Background track */}
        <circle
          cx={size/2}
          cy={size/2}
          r={radius}
          fill="none"
          stroke="rgba(255,255,255,0.06)"
          strokeWidth={strokeWidth}
        />
        {/* Glow effect */}
        {showGlow && progress > 0 && (
          <circle
            cx={size/2}
            cy={size/2}
            r={radius}
            fill="none"
            stroke={color}
            strokeWidth={strokeWidth + 8}
            strokeDasharray={circumference}
            strokeDashoffset={offset}
            strokeLinecap="round"
            style={{
              filter: 'blur(8px)',
              opacity: 0.3,
              transition: 'stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
            }}
          />
        )}
        {/* Progress arc */}
        <circle
          cx={size/2}
          cy={size/2}
          r={radius}
          fill="none"
          stroke={color}
          strokeWidth={strokeWidth}
          strokeDasharray={circumference}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{
            transition: 'stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
          }}
        />
      </svg>
      <div style={{
        position: 'absolute',
        inset: 0,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}>
        {children}
      </div>
    </div>
  );
}

// Premium Linear Progress Bar
function ProgressBar({ progress, color = C.green, height = 4, showGlow = false, animated = true }) {
  const clampedProgress = Math.min(100, Math.max(0, progress));
  
  return (
    <div style={{
      width: '100%',
      height,
      background: 'rgba(255,255,255,0.06)',
      borderRadius: height,
      overflow: 'hidden',
      position: 'relative',
    }}>
      {showGlow && (
        <div style={{
          position: 'absolute',
          inset: 0,
          background: color,
          filter: 'blur(8px)',
          opacity: 0.3,
          width: `${clampedProgress}%`,
          transition: animated ? 'width 0.6s cubic-bezier(0.4, 0, 0.2, 1)' : 'none',
        }} />
      )}
      <div style={{
        height: '100%',
        width: `${clampedProgress}%`,
        background: color,
        borderRadius: height,
        transition: animated ? 'width 0.6s cubic-bezier(0.4, 0, 0.2, 1)' : 'none',
        transformOrigin: 'left',
      }} />
    </div>
  );
}

function InsightsScreen({ allDays, goals, profile }) {
  const [activeTab, setActiveTab] = useState('overview');
  
  // Calculate 7-day data
  const last7Days = useMemo(() => {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = localDateKey(d);
      const dayData = allDays[key];
      const totals = {};
      Object.keys(DEFAULT_GOALS).forEach(k => { totals[k] = 0; });
      (dayData?.meals || []).forEach(m => {
        const mt = sumNutrients(m.components);
        Object.keys(mt).forEach(k => { totals[k] += mt[k]; });
      });
      days.push({ date: d, key, totals, hasMeals: (dayData?.meals || []).length > 0 });
    }
    return days;
  }, [allDays]);
  
  // Calculate averages
  const daysWithMeals = last7Days.filter(d => d.hasMeals);
  const avgCalories = daysWithMeals.length > 0
    ? Math.round(daysWithMeals.reduce((a, d) => a + d.totals.calories, 0) / daysWithMeals.length)
    : 0;
  const avgProtein = daysWithMeals.length > 0
    ? Math.round(daysWithMeals.reduce((a, d) => a + d.totals.protein_g, 0) / daysWithMeals.length)
    : 0;
  
  // Find nutrient gaps (nutrients consistently below 50%)
  const nutrientGaps = useMemo(() => {
    if (daysWithMeals.length < 3) return [];
    
    const gaps = [];
    const trackKeys = Object.keys(LIFE_IMPACT);
    
    trackKeys.forEach(key => {
      const total = daysWithMeals.reduce((a, d) => a + (d.totals[key] || 0), 0);

      const goal = goals[key] || 0;
      if (goal > 0) {

        if (pctAvg < 60) {
          gaps.push({ key, pct: pctAvg, avg, goal, ...LIFE_IMPACT[key] });
        }
      }
    });
    
    return gaps.sort((a, b) => a.pct - b.pct).slice(0, 5);
  }, [daysWithMeals, goals]);
  
  // Weekly chart max
  const maxCal = Math.max(...last7Days.map(d => d.totals.calories), goals.calories);

function SnapScreen({ onClose, onMealLogged, goals }) {
  const [mode, setMode] = useState('capture'); // capture, analyzing, review, portion
  const [capturedImage, setCapturedImage] = useState(null);
  const [analysisResult, setAnalysisResult] = useState(null);
  const [error, setError] = useState(null);
  const [scanType, setScanType] = useState('food'); // food, label
  const [portionStep, setPortionStep] = useState(null);
  const [adjustedComponents, setAdjustedComponents] = useState([]);
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const fileInputRef = useRef(null);
  
  // Start camera
  useEffect(() => {
    if (mode === 'capture') {
      startCamera();
    }
    return () => stopCamera();
  }, [mode]);
  
  const startCamera = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
      }
    } catch (err) {
      console.error('Camera error:', err);
      setError('Camera access denied. Please allow camera permissions.');
    }
  };
  
  const stopCamera = () => {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
  };
  
  const capturePhoto = async () => {
    if (!videoRef.current) return;
    
    const canvas = document.createElement('canvas');
    canvas.width = videoRef.current.videoWidth;
    canvas.height = videoRef.current.videoHeight;
    canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    
    setCapturedImage(dataUrl);
    stopCamera();
    await analyzeImage(dataUrl);
  };
  
  const handleFileSelect = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const dataUrl = ev.target.result;
      setCapturedImage(dataUrl);
      stopCamera();
      await analyzeImage(dataUrl);
    };
    reader.readAsDataURL(file);
  };
  
  const analyzeImage = async (dataUrl) => {
    setMode('analyzing');
    setError(null);
    
    try {
      const base64 = await resizeImage(dataUrl, 1024);
      
      let result;
      if (scanType === 'label') {
        result = await analyzeBarcode(base64);
        // Convert barcode result to meal format
        const nutrients = result.nutrients || {};
        setAnalysisResult({
          meal_name: result.product_name || 'Scanned Product',
          confidence: 0.95,
          components: [{
            name: result.product_name || 'Product',
            portion_description: result.serving_size || '1 serving',
            category: 'other',
            confidence: 'high',
            nutrients,
          }],
          serving_size: result.serving_size,
          servings_per_container: result.servings_per_container,
        });
        setAdjustedComponents([{
          name: result.product_name || 'Product',
          portion_description: result.serving_size || '1 serving',
          category: 'other',
          confidence: 'high',
          nutrients,
          multiplier: 1,
        }]);
      } else {
        result = await analyzeFood(base64);
        setAnalysisResult(result);
        setAdjustedComponents((result.components || []).map(c => ({ ...c, multiplier: 1 })));
      }
      
      setMode('review');
    } catch (err) {
      console.error('Analysis error:', err);
      setError(err.message || 'Failed to analyze image');
      setMode('capture');
      setCapturedImage(null);
      startCamera();
    }
  };
  
  const adjustPortion = (index, multiplier) => {
    setAdjustedComponents(prev => {
      const updated = [...prev];
      updated[index] = { ...updated[index], multiplier };
      return updated;
    });
  };
  
  const saveMeal = async () => {
    const components = adjustedComponents.map(c => ({
      ...c,
      nutrients: scaleNutrientMap(c.nutrients, c.multiplier || 1),
    }));
    
    const meal = {
      id: uid(),
      name: analysisResult?.meal_name || 'Meal',
      time: new Date().toISOString(),
      image: capturedImage,
      components,
      confidence: analysisResult?.confidence,
    };
    
    onMealLogged(meal);
  };
  
  const retake = () => {
    setCapturedImage(null);
    setAnalysisResult(null);
    setAdjustedComponents([]);
    setError(null);
    setMode('capture');
  };
  
  // Render based on mode
  if (mode === 'capture') {
    return (

function MealDetailScreen({ meal, goals, onClose, onDelete, onUpdate }) {
  const [isEditing, setIsEditing] = useState(false);
  const [components, setComponents] = useState(meal?.components || []);
  
  const totals = useMemo(() => sumNutrients(components), [components]);
  const score = mealScore(totals, goals);
  const sl = scoreLabel(score);
  const imgSrc = toImageSrc(meal?.image);
  
  const handleDelete = () => {
    if (confirm('Delete this meal?')) {
      onDelete(meal.id);
    }
  };
  
  const adjustComponent = (index, multiplier) => {
    setComponents(prev => {
      const updated = [...prev];
      const original = meal.components[index];
      updated[index] = {
        ...updated[index],
        nutrients: scaleNutrientMap(original.nutrients, multiplier),
        multiplier,
      };
      return updated;
    });
  };
  
  const saveChanges = () => {
    onUpdate({ ...meal, components });
    setIsEditing(false);
  };
  
  return (
    <div style={{
      position: 'fixed',
      inset: 0,
      background: '#000',
      zIndex: 1000,
      display: 'flex',
      flexDirection: 'column',
      overflow: 'hidden',

        left: 0,
        right: 0,
        zIndex: 20,

          {getIcon('chevronLeft', { size: 22 })}

          <div style={{ position: 'relative', height: 260 }}>
            <img src={imgSrc} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            <div style={{
              position: 'absolute',
              bottom: 0,
              left: 0,
              right: 0,
              height: 100,

            ))}
          </div>
          
          {/* Full Nutrient Breakdown */}
          <div style={{ marginTop: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.textTertiary, marginBottom: 12, letterSpacing: '0.05em' }}>

                    return (
                      <div key={key} style={{ display: 'flex', alignItems: 'center', marginBottom: 8 }}>
                        <div style={{ flex: 1, fontSize: 13, color: C.textSecondary }}>{NUTRIENT_LABELS[key]}</div>

                    );
                  })}
                </div>
              ))}
            </Card>
          </div>
        </div>
      </div>
      
      {/* Save Button when editing */}

}

    return () => clearTimeout(timer);
  }, [onDismiss]);
  
  return (
    <div style={{
      position: 'fixed',
      top: 'max(20px, env(safe-area-inset-top))',
      left: 20,
      right: 20,
      background: `linear-gradient(135deg, ${C.greenDim} 0%, ${C.bgCard} 100%)`,
      border: `1px solid ${C.green}30`,
      borderRadius: 16,
      padding: 20,
      zIndex: 2000,
      animation: 'slideDown 0.4s cubic-bezier(0.4, 0, 0.2, 1)',
      boxShadow: `0 20px 40px rgba(0,0,0,0.5), 0 0 60px ${C.greenGlow}`,
    }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 14 }}>
        <div style={{
          width: 44,
          height: 44,
          borderRadius: 12,
          background: C.greenDim,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          animation: 'successPop 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s both',
        }}>
          {getIcon('award', { size: 24, color: C.green })}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 700, color: C.green, marginBottom: 4 }}>
            Milestone Reached!
          </div>
          <div style={{ fontSize: 14, color: C.textSecondary, lineHeight: 1.4 }}>
            {milestone.text}
          </div>
        </div>
        <button onClick={onDismiss} style={{ color: C.textMuted, padding: 4 }}>
          {getIcon('x', { size: 18 })}
        </button>
      </div>
    </div>
  );
}

  const [isLoading, setIsLoading] = useState(true);
  
  // Load data on mount
  useEffect(() => {
    const loadData = async () => {
      const storedDays = await storage.get('nouri:days') || {};
      const storedProfile = await storage.get('nouri:profile') || {
        name: '',
        goal_preset: 'default',
        custom_goals: DEFAULT_GOALS,
        quick_adds: DEFAULT_QUICK_ADDS,
        current_streak: 0,
        best_streak: 0,
        last_logged_date: null,
        milestones_shown: [],
      };
      
      setAllDays(storedDays);
      setProfile(storedProfile);
      setIsLoading(false);
    };
    loadData();
  }, []);
  
  // Save data when it changes
  useEffect(() => {
    if (!isLoading) {
      storage.set('nouri:days', allDays);
    }
  }, [allDays, isLoading]);
  
  useEffect(() => {
    if (!isLoading && profile) {
      storage.set('nouri:profile', profile);
    }
  }, [profile, isLoading]);
  
  const goals = profile?.custom_goals || DEFAULT_GOALS;
  const dayData = allDays[selectedDate] || { meals: [] };
  
  const handleMealLogged = useCallback((meal) => {
    const dateKey = today();
    setAllDays(prev => {
      const dayMeals = prev[dateKey]?.meals || [];
      return {
        ...prev,
        [dateKey]: { meals: [...dayMeals, meal] },
      };
    });
    
    // Update streak
    setProfile(prev => {
      const updated = updateStreak(prev);
      
      // Check milestones
      const totalMeals = Object.values(allDays).reduce((a, d) => a + (d?.meals || []).length, 0) + 1;
      const milestones = checkMilestones(updated, totalMeals);
      if (milestones.length > 0) {
        setMilestone(milestones[0]);
        return {
          ...updated,
          milestones_shown: [...(updated.milestones_shown || []), milestones[0].id],
        };
      }
      
      return updated;
    });
    
    setShowSnap(false);
    setSelectedDate(dateKey);
  }, [allDays]);
  
  const handleQuickAdd = useCallback((quickAdd) => {
    const meal = {
      id: uid(),
      name: quickAdd.label,
      time: new Date().toISOString(),
      components: [{
        name: quickAdd.label,
        portion_description: '1 serving',
        nutrients: quickAdd.nutrients,
      }],
    };
    handleMealLogged(meal);
  }, [handleMealLogged]);
  
  const handleDeleteMeal = useCallback((mealId) => {
    setAllDays(prev => {
      const updated = { ...prev };
      Object.keys(updated).forEach(key => {
        if (updated[key]?.meals) {
          updated[key] = {
            ...updated[key],
            meals: updated[key].meals.filter(m => m.id !== mealId),
          };
        }
      });
      return updated;
    });
    setSelectedMeal(null);
  }, []);
  
  const handleUpdateMeal = useCallback((updatedMeal) => {
    setAllDays(prev => {
      const updated = { ...prev };
      Object.keys(updated).forEach(key => {
        if (updated[key]?.meals) {
          updated[key] = {
            ...updated[key],
            meals: updated[key].meals.map(m => m.id === updatedMeal.id ? updatedMeal : m),
          };
        }
      });
      return updated;
    });
    setSelectedMeal(updatedMeal);
  }, []);
  
  if (isLoading) {
    return (
      <div style={{
        height: '100dvh',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        background: '#000',
        gap: 24,
      }}>
        <div style={{ animation: 'breathe 2s ease-in-out infinite' }}>
          <ProgressRing progress={66} size={80} strokeWidth={4}>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.green }}>N</div>
          </ProgressRing>
        </div>
        <div style={{ fontSize: 14, color: C.textMuted }}>Loading...</div>
      </div>
    );
  }
  
  return (
    <div style={{
      height: '100dvh',
      display: 'flex',
      flexDirection: 'column',
      background: '#000',
      position: 'relative',
      overflow: 'hidden',
    }}>
      {/* Main Content */}
      {activeTab === 'today' && (
        <TodayScreen
          dayData={dayData}
          goals={goals}
          profile={profile}
          selectedDate={selectedDate}
          onDateChange={setSelectedDate}
          onMealClick={setSelectedMeal}
          onQuickAdd={handleQuickAdd}
        />
      )}
      
      {activeTab === 'insights' && (
        <InsightsScreen allDays={allDays} goals={goals} profile={profile} />
      )}
      
      {activeTab === 'me' && (
        <MeScreen
          profile={profile}
          onUpdateProfile={setProfile}
          allDays={allDays}
        />
      )}
      
      {/* Bottom Navigation */}
      <BottomNav
        activeTab={activeTab}
        onTabChange={(tab) => {
          if (tab === 'snap') {
            setShowSnap(true);
          } else {
            setActiveTab(tab);
          }
        }}
      />
      
      {/* Snap Screen Overlay */}
      {showSnap && (
        <SnapScreen
          onClose={() => setShowSnap(false)}
          onMealLogged={handleMealLogged}
          goals={goals}
        />
      )}
      
      {/* Meal Detail Overlay */}
      {selectedMeal && (
        <MealDetailScreen
          meal={selectedMeal}
          goals={goals}
          onClose={() => setSelectedMeal(null)}
          onDelete={handleDeleteMeal}
          onUpdate={handleUpdateMeal}
        />
      )}
      
      {/* Milestone Toast */}
      {milestone && (
        <MilestoneToast
          milestone={milestone}
          onDismiss={() => setMilestone(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
