function localDateKey(date=new Date()){const y=date.getFullYear();const mo=String(date.getMonth()+1).padStart(2,'0');const d=String(date.getDate()).padStart(2,'0');return `${y}-${mo}-${d}`;}
const today=()=>localDateKey();
function parseLocalDateKey(s){const[y,mo,d]=s.split('-').map(Number);return new Date(y,mo-1,d);}
const pct=(val,goal)=>goal>0?Math.min(100,(val/goal)*100):0;

function sumNutrients(components){
  const t={};Object.keys(DEFAULT_GOALS).forEach(k=>{t[k]=0;});
  (components||[]).forEach(c=>{if(c.nutrients)Object.keys(c.nutrients).forEach(k=>{if(t[k]!==undefined)t[k]+=(c.nutrients[k]||0);});});
  return t;
}

function scaleNutrientMap(nutrients,multiplier){
  const scaled={};
  Object.keys(nutrients||{}).forEach(k=>{scaled[k]=(nutrients[k]||0)*multiplier;});
  return scaled;
}

function parseServingAmountGrams(servingSize){
  if(!servingSize)return null;
  const raw=String(servingSize).trim().toLowerCase();
  const matches=[
    {re:/(\d+(?:[.,]\d+)?)\s*(kg|kilogram|kilograms)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(g|gram|grams)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(l|liter|liters)\b/,mult:1000},
    {re:/(\d+(?:[.,]\d+)?)\s*(ml|milliliter|milliliters)\b/,mult:1},
    {re:/(\d+(?:[.,]\d+)?)\s*(fl\s*oz|fluid ounce|fluid ounces)\b/,mult:29.5735},
    {re:/(\d+(?:[.,]\d+)?)\s*(oz|ounce|ounces)\b/,mult:28.3495},
  ];
  for(const {re,mult} of matches){
    const match=raw.match(re);
    if(match)return Math.round(parseFloat(match[1].replace(",", "."))*mult*10)/10;
  }
  return null;
}

function resizeImage(dataUrl,maxPx=1024){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxPx/Math.max(img.width,img.height));
      const c=document.createElement("canvas");c.width=img.width*scale;c.height=img.height*scale;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",0.8).split(",")[1]);
    };img.src=dataUrl;
  });
}

function toImageSrc(imageData){
  if(!imageData)return null;
  return imageData.startsWith("data:") ? imageData : `data:image/jpeg;base64,${imageData}`;
}

function mealScore(mealTotals, goals){
  const keys=Object.keys(goals).filter(k=>goals[k]>0);
  let hits=0;keys.forEach(k=>{if((mealTotals[k]||0)/goals[k]>=0.15)hits++;});
  return Math.round((hits/keys.length)*100)/10;
}

function scoreLabel(s){
  if(s>=8.0)return{label:"Excellent",color:C.green};
  if(s>=6.0)return{label:"Good",color:C.blue};
  if(s>=4.0)return{label:"Fair",color:C.amber};
  return{label:"Light",color:C.textDim};
}

function updateStreak(profile){
  const ld=profile.last_logged_date;
  const t=today();
  if(ld===t)return profile;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yestStr=localDateKey(yest);
  let streak=ld===yestStr?(profile.current_streak||0)+1:1;
  const best=Math.max(streak,profile.best_streak||0);
  return{...profile,current_streak:streak,best_streak:best,last_logged_date:t};
}

function checkMilestones(profile,totalMeals){
  const shown=profile.milestones_shown||[];
  const milestones=[];
  if(totalMeals>=1&&!shown.includes("first_meal"))milestones.push({id:"first_meal",text:"Welcome to Nouri! Your first meal is logged. This is the start of understanding your nutrition."});
  if(totalMeals>=25&&!shown.includes("25_meals"))milestones.push({id:"25_meals",text:"25 meals tracked. You're building a real picture of your nutrition."});
  if(totalMeals>=50&&!shown.includes("50_meals"))milestones.push({id:"50_meals",text:"50 meals. Nouri knows your patterns now. Check your Insights."});
  if((profile.current_streak||0)>=30&&!shown.includes("30_day_streak"))milestones.push({id:"30_day_streak",text:"30 days. This isn't a diet. This is a habit."});
  return milestones;
}

{"meal_name":"","confidence":0.9,"hand_detected":false,"components":[{"name":"","portion_oz":0,"portion_description":"","cooking_method":"raw","category":"protein","confidence":"high","nutrients":{"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"saturated_fat_g":0,"fiber_g":0,"sugar_g":0,"sodium_mg":0,"cholesterol_mg":0,"vitamin_a_mcg":0,"vitamin_b1_mg":0,"vitamin_b2_mg":0,"vitamin_b3_mg":0,"vitamin_b5_mg":0,"vitamin_b6_mg":0,"vitamin_b9_mcg":0,"vitamin_b12_mcg":0,"vitamin_c_mg":0,"vitamin_d_mcg":0,"vitamin_e_mg":0,"vitamin_k_mcg":0,"calcium_mg":0,"iron_mg":0,"magnesium_mg":0,"phosphorus_mg":0,"potassium_mg":0,"zinc_mg":0,"selenium_mcg":0,"manganese_mg":0,"copper_mg":0,"omega3_mg":0,"omega6_mg":0,"trans_fat_g":0}}],"meal_totals":{}}
The category field must be one of: protein, grain, fat, vegetable, other. Use "raw" when the cooking method is unknown or not applicable.`;

async function analyzeFood({imageBase64,text,palmWidth,palmLength}){
  let content=[];
  if(imageBase64){
    content.push({type:"image",source:{type:"base64",media_type:"image/jpeg",data:imageBase64}});
    let msg="Analyze this meal.";
    if(palmWidth)msg+=` User palm: ~${palmWidth}" wide x ${palmLength}" long. Use as scale if hand visible.`;
    content.push({type:"text",text:msg});
  }else{
    content.push({type:"text",text:`Analyze this food: ${text}. Estimate standard serving unless amount specified.`});
  }
  const res=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","x-api-key":getApiKey(),"anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:4096,system:FOOD_SYSTEM,messages:[{role:"user",content}]})});
  if(!res.ok)throw new Error("API error "+res.status);
  const data=await res.json();
  let parsed;try{parsed=JSON.parse(data.content[0].text.trim());}catch{throw new Error("Could not parse AI response — please try again");}
  if(!parsed.meal_totals||Object.keys(parsed.meal_totals).length===0)parsed.meal_totals=sumNutrients(parsed.components);
  return parsed;
}

async function lookupBarcode(barcode){
  const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}?fields=product_name,nutriments,serving_size,image_url,brands`);
  const data=await res.json();
  if(data.status!==1)return null;
  const p=data.product;const n=p.nutriments||{};
  const reported=[];
  const servingSize=(p.serving_size||"").trim();
  const servingAmountGrams=parseServingAmountGrams(servingSize);
  const servingFactor=servingAmountGrams?servingAmountGrams/100:null;
  const markReported=(key)=>{if(!reported.includes(key))reported.push(key);};
  const mapN=(offKey,nouriKey,mult=1)=>{
    const servingKey=offKey.replace(/_100g$/,"_serving");
    const servingValue=n[servingKey];
    if(servingValue!=null&&servingValue!==0){
      markReported(nouriKey);
      return servingValue*mult;
    }
    const per100Value=n[offKey];
    if(per100Value!=null&&per100Value!==0){
      markReported(nouriKey);
      return servingFactor!=null?per100Value*servingFactor*mult:per100Value*mult;
    }
    return 0;
  };
  const nutrients={
    calories:mapN("energy-kcal_100g","calories"),protein_g:mapN("proteins_100g","protein_g"),
    carbs_g:mapN("carbohydrates_100g","carbs_g"),fat_g:mapN("fat_100g","fat_g"),
    saturated_fat_g:mapN("saturated-fat_100g","saturated_fat_g"),fiber_g:mapN("fiber_100g","fiber_g"),
    sugar_g:mapN("sugars_100g","sugar_g"),sodium_mg:mapN("sodium_100g","sodium_mg",1000),
    cholesterol_mg:mapN("cholesterol_100g","cholesterol_mg",1000),vitamin_a_mcg:mapN("vitamin-a_100g","vitamin_a_mcg"),
    vitamin_b1_mg:mapN("vitamin-b1_100g","vitamin_b1_mg"),vitamin_b2_mg:mapN("vitamin-b2_100g","vitamin_b2_mg"),
    vitamin_b3_mg:mapN("vitamin-pp_100g","vitamin_b3_mg"),vitamin_b5_mg:mapN("pantothenic-acid_100g","vitamin_b5_mg"),
    vitamin_b6_mg:mapN("vitamin-b6_100g","vitamin_b6_mg"),vitamin_b9_mcg:mapN("folates_100g","vitamin_b9_mcg",1000),
    vitamin_b12_mcg:mapN("vitamin-b12_100g","vitamin_b12_mcg",1000),vitamin_c_mg:mapN("vitamin-c_100g","vitamin_c_mg"),
    vitamin_d_mcg:mapN("vitamin-d_100g","vitamin_d_mcg",1000000),vitamin_e_mg:mapN("vitamin-e_100g","vitamin_e_mg"),
    vitamin_k_mcg:mapN("vitamin-k_100g","vitamin_k_mcg",1000),calcium_mg:mapN("calcium_100g","calcium_mg",1000),
    iron_mg:mapN("iron_100g","iron_mg",1000),magnesium_mg:mapN("magnesium_100g","magnesium_mg",1000),
    phosphorus_mg:mapN("phosphorus_100g","phosphorus_mg",1000),potassium_mg:mapN("potassium_100g","potassium_mg",1000),
    zinc_mg:mapN("zinc_100g","zinc_mg",1000),selenium_mcg:mapN("selenium_100g","selenium_mcg",1000),
    manganese_mg:mapN("manganese_100g","manganese_mg",1000),copper_mg:mapN("copper_100g","copper_mg",1000),
    omega3_mg:mapN("omega-3-fat_100g","omega3_mg",1000),omega6_mg:mapN("omega-6-fat_100g","omega6_mg",1000),
    trans_fat_g:mapN("trans-fat_100g","trans_fat_g"),
  };
  const portionOz=servingAmountGrams?Math.round((servingAmountGrams/28.3495)*10)/10:3.5;
  const portionDescription=servingSize?`per ${servingSize}`:"per 100g";
  return{meal_name:p.product_name||"Scanned product",confidence:1.0,hand_detected:false,source:"barcode",image_url:p.image_url,
    components:[{name:p.product_name||"Product",portion_oz:portionOz,portion_description:portionDescription,cooking_method:"packaged",category:"other",confidence:"verified",nutrients,reportedNutrients:reported}],
    meal_totals:nutrients};
}

// ─── INSIGHT ALGORITHMS ───────────────────────────────────────────────────────
function generateInsights(allMeals, goals, allCheckins){
  const dates=Object.keys(allMeals).sort();
  if(dates.length<7)return{insights:[],gaps:[],weeklyRhythm:[]};
  const dailyTotals={};
  dates.forEach(d=>{dailyTotals[d]=sumNutrients((allMeals[d]||[]).map(m=>({nutrients:m.meal_totals})));});
  const last21=dates.slice(-21);
  const gaps=[];
  Object.keys(DEFAULT_GOALS).forEach(k=>{
    if(!goals[k])return;
    const daysBelow=last21.filter(d=>((dailyTotals[d]?.[k]||0)/goals[k])<0.5);
    if(daysBelow.length>=14){
      const avg=last21.reduce((s,d)=>s+(dailyTotals[d]?.[k]||0),0)/last21.length;
      gaps.push({key:k,label:NUTRIENT_LABELS[k],avgPct:Math.round((avg/goals[k])*100)});
    }
  });
  gaps.sort((a,b)=>a.avgPct-b.avgPct);
  const insights=[];
  // Timing pattern
  const lateDays=dates.filter(d=>(allMeals[d]||[]).some(m=>new Date(m.timestamp).getHours()>=20));
  const earlyDays=dates.filter(d=>!lateDays.includes(d));
  if(allCheckins&&lateDays.length>=3&&earlyDays.length>=3){
    const avgSleepLate=lateDays.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].sleep_score||0),0)/Math.max(1,lateDays.filter(d=>allCheckins[d]).length);
    const avgSleepEarly=earlyDays.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].sleep_score||0),0)/Math.max(1,earlyDays.filter(d=>allCheckins[d]).length);
    if(avgSleepEarly-avgSleepLate>=0.5&&earlyDays.filter(d=>allCheckins[d]).length>=3){
      insights.push({id:"sleep_timing",icon:"🌙",color:C.purple,label:"SLEEP PATTERN",title:"Earlier dinners = better sleep",text:`On days you stop eating by 8:30 PM, you rate your sleep ${avgSleepEarly.toFixed(1)} vs ${avgSleepLate.toFixed(1)} on late-eating nights.`});
    }else{
      insights.push({id:"timing",icon:"🌙",color:C.purple,label:"TIMING PATTERN",title:"Late eating detected",text:`You've eaten after 8:30 PM on ${lateDays.length} days. In Phase 2, this will correlate with Whoop sleep recovery.`});
    }
  }
  // Day-of-week sodium
  const wkday=dates.filter(d=>![0,6].includes(parseLocalDateKey(d).getDay())).map(d=>dailyTotals[d]);
  const wkend=dates.filter(d=>[0,6].includes(parseLocalDateKey(d).getDay())).map(d=>dailyTotals[d]);
  if(wkday.length>=5&&wkend.length>=2){
    const wdNa=wkday.reduce((s,d)=>s+(d.sodium_mg||0),0)/wkday.length;
    const weNa=wkend.reduce((s,d)=>s+(d.sodium_mg||0),0)/wkend.length;
    if(weNa>wdNa*1.5)insights.push({id:"dow_sodium",icon:"📅",color:C.amber,label:"WEEKLY PATTERN",title:"Weekend sodium is higher",text:`Your weekend sodium is ${(weNa/wdNa).toFixed(1)}x your weekday average — likely from dining out.`});
  }
  // Protein timing
  const goodProt=dates.filter(d=>(allMeals[d]||[]).filter(m=>new Date(m.timestamp).getHours()<12).reduce((s,m)=>s+(m.meal_totals?.protein_g||0),0)>=30);
  const lowProt=dates.filter(d=>!goodProt.includes(d));
  if(goodProt.length>=3&&lowProt.length>=3){
    const gp=goals.protein_g||50;
    const gc=goodProt.reduce((s,d)=>s+Math.min(1,(dailyTotals[d]?.protein_g||0)/gp),0)/goodProt.length;
    const lc=lowProt.reduce((s,d)=>s+Math.min(1,(dailyTotals[d]?.protein_g||0)/gp),0)/lowProt.length;
    // Energy correlation
    if(allCheckins&&goodProt.filter(d=>allCheckins[d]).length>=3){
      const gcE=goodProt.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/goodProt.filter(d=>allCheckins[d]).length;
      const lcE=lowProt.filter(d=>allCheckins[d]).reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/Math.max(1,lowProt.filter(d=>allCheckins[d]).length);
      if(gcE-lcE>=0.5){insights.push({id:"protein_energy",icon:"💪",color:C.green,label:"ENERGY INSIGHT",title:"Morning protein boosts energy",text:`On days with 30g+ protein before noon, you rate your energy ${gcE.toFixed(1)} vs ${lcE.toFixed(1)} on other days.`});}
    } else if(gc>lc*1.1){
      insights.push({id:"protein_timing",icon:"💪",color:C.green,label:"PROTEIN INSIGHT",title:"Morning protein matters",text:`When you eat 30g+ protein before noon, you end the day ${Math.round((gc-lc)*100)}% closer to your protein target.`});
    }
  }
  // Nutrient-energy correlations
  if(allCheckins){
    Object.keys(NUTRIENT_INFO).slice(0,5).forEach(k=>{
      if(!goals[k])return;
      const highDays=dates.filter(d=>allCheckins[d]&&(dailyTotals[d]?.[k]||0)/goals[k]>=0.6);
      const lowDays=dates.filter(d=>allCheckins[d]&&(dailyTotals[d]?.[k]||0)/goals[k]<0.4);
      if(highDays.length>=3&&lowDays.length>=3){
        const hE=highDays.reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/highDays.length;
        const lE=lowDays.reduce((s,d)=>s+(allCheckins[d].energy_score||0),0)/lowDays.length;
        if(hE-lE>=0.5){
          insights.push({id:`energy_${k}`,icon:"⚡",color:C.amber,label:"ENERGY PATTERN",title:`${NUTRIENT_LABELS[k]} affects your energy`,text:`When your ${NUTRIENT_LABELS[k]} is on target, you rate your energy ${hE.toFixed(1)} — vs ${lE.toFixed(1)} on low days.`});
        }
      }
    });
  }
  // Streaks
  Object.keys(DEFAULT_GOALS).slice(0,8).forEach(k=>{
    if(!goals[k])return;
    let streak=0,best=0;
    dates.forEach(d=>{if((dailyTotals[d]?.[k]||0)/goals[k]>=0.8){streak++;best=Math.max(best,streak);}else streak=0;});
    if(best>=3)insights.push({id:`streak_${k}`,icon:"🔥",color:C.amber,label:"STREAK",title:`${NUTRIENT_LABELS[k]}: ${best}-day streak`,text:`You hit your ${NUTRIENT_LABELS[k]} target ${best} days in a row.`});
  });
  const weeklyRhythm=dates.slice(-7).map(d=>{
    const t=dailyTotals[d]||{};
    const scores=Object.keys(DEFAULT_GOALS).map(k=>goals[k]?Math.min(1,(t[k]||0)/goals[k]):0);
    return{date:d,score:scores.reduce((s,v)=>s+v,0)/scores.length,label:parseLocalDateKey(d).toLocaleDateString("en",{weekday:"short"}).slice(0,3)};
  });
  return{insights:insights.slice(0,8),gaps:gaps.slice(0,5),weeklyRhythm};
}

function buildWeeklySummary(allMeals, goals){
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(localDateKey(d));}
  const mealsThisWeek=last7.reduce((s,d)=>s+(allMeals[d]?.length||0),0);
  const allComponents=last7.flatMap(d=>(allMeals[d]||[]).map(m=>({nutrients:m.meal_totals})));
  const weekTotals=sumNutrients(allComponents);
  const scores=last7.map(d=>{const ms=allMeals[d]||[];return ms.length>0?ms.reduce((s,m)=>s+mealScore(m.meal_totals,goals),0)/ms.length:null;}).filter(s=>s!==null);
  const avgScore=scores.length?Math.round(scores.reduce((s,v)=>s+v,0)/scores.length*10)/10:0;
  const nutScores=MICRO_KEYS.map(k=>({key:k,label:NUTRIENT_LABELS[k],pct:pct(weekTotals[k]||0,(goals[k]||DEFAULT_GOALS[k])*7)}));
  nutScores.sort((a,b)=>b.pct-a.pct);
  const topNut=nutScores[0]||{label:"Vitamin K"};
  const gapNut=nutScores[nutScores.length-1]||{label:"Magnesium"};
  return{mealsThisWeek,avgScore,topNut:topNut.label,gapNut:gapNut.label};
}

function AnimatedNumber({ value, duration = 600, decimals = 0 }) {
  const [displayValue, setDisplayValue] = useState(0);
  const prevValue = useRef(0);
  useEffect(() => {
    const start = prevValue.current;
    const end = value || 0;
    const startTime = performance.now();
    const animate = (currentTime) => {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = start + (end - start) * eased;
      setDisplayValue(current);
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        prevValue.current = end;
      }
    };
    requestAnimationFrame(animate);
  }, [value, duration]);
  return decimals > 0 ? displayValue.toFixed(decimals) : Math.round(displayValue);
}

function CircularRing({value,goal,color,icon,label,size=72}){
  const r=(size-12)/2,circ=2*Math.PI*r,offset=circ-(circ*pct(value,goal))/100;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`${color}18`} strokeWidth={7}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={7} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 0.6s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
          <div style={{color:C.textVeryDim,lineHeight:1,fontSize:13}}>{icon}</div>
          <div style={{color:C.textPrimary,fontSize:15,fontWeight:700,letterSpacing:"-0.3px"}}>{Math.round(value)}</div>
        </div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{color:C.textVeryDim,fontSize:10,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>{label}</div>
        <div style={{color:color,fontSize:11,fontWeight:600,opacity:0.85}}>{Math.round(value)}</div>
        <div style={{color:"rgba(255,255,255,0.18)",fontSize:9}}>of {Math.round(goal)}{label==="Calories"?"":label==="Protein"||label==="Carbs"||label==="Fat"?"g":""}</div>
      </div>
    </div>
  );
}

function NutrientBar({label,value,goal,prevValue,source,confidence,isVerified,onTap,nutrientKey}){
  const p=pct(value,goal);
  const prevP=prevValue!=null?pct(prevValue,goal):null;
  const barColor=p>=30?C.green:p>=15?C.blue:C.amber;
  const showEstimate=(source==="search")||(source==="meal"&&confidence<0.9)||(source==="barcode"&&!isVerified);
  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:8}} onClick={()=>onTap&&onTap(nutrientKey)}>
        <div style={{width:84,color:C.textDim,fontSize:12,flexShrink:0,cursor:onTap?"pointer":"default"}}>{label}</div>
        <div style={{flex:1,height:3,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden",position:"relative"}}>
          {prevP!=null&&<div style={{position:"absolute",left:0,top:0,width:`${prevP}%`,height:"100%",background:`${barColor}55`,borderRadius:2}}/>}
          <div style={{width:`${p}%`,height:"100%",background:barColor,borderRadius:2,transition:"width 0.4s ease"}}/>
        </div>
        <div style={{width:44,color:C.textDim,fontSize:11,textAlign:"right",flexShrink:0}}>
          {showEstimate?"~":""}{Math.round(p)}%
          {source==="barcode"&&isVerified&&<span style={{color:C.green,fontSize:10}}> ✓</span>}
        </div>
      </div>
    </div>
  );
}

      </div>

        {isInteractive&&<div style={{color:"rgba(255,255,255,0.12)",fontSize:14,lineHeight:1}}>›</div>}

    </div>

}

}

// ─── HERO RING ────────────────────────────────────────────────────────────────
function HeroRing({totals, goals, avgScore, meals}) {
  const noMeals = meals.length === 0;
  const calGoal = goals.calories || 2000;
  const protGoal = goals.protein_g || 175;
  const calPct = Math.min(1, (totals.calories||0) / calGoal);
  const protPct = Math.min(1, (totals.protein_g||0) / protGoal);
  const scorePct = Math.min(1, (avgScore||0) / 10);
  const size = 180; const cx = 90; const cy = 90;
  const rings = [
    {r:78, sw:5, pct:calPct,  color:"#3ECF8E"},
    {r:64, sw:4, pct:protPct, color:"rgba(255,255,255,0.6)"},
    {r:51, sw:3, pct:scorePct,color:"rgba(251,191,36,0.7)"},
  ];
  const calLabel = noMeals ? "Log your first meal" : `${Math.round(totals.calories||0).toLocaleString()} / ${calGoal.toLocaleString()} cal`;
  const protLabel = `${Math.round(totals.protein_g||0)}g / ${protGoal}g protein`;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:32,marginTop:4}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          {rings.map(({r,sw,pct,color},i)=>{
            const circ=2*Math.PI*r;
            const offset=circ*(1-pct);
            return(<g key={i}>
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth={sw}/>
              {pct>0&&<circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw+6}
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{filter:"blur(6px)",opacity:0.25,transition:"stroke-dashoffset 0.8s ease-out",transitionDelay:`${i*0.1}s`}}/>}
              <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
                strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
                style={{transition:"stroke-dashoffset 0.8s ease-out",transitionDelay:`${i*0.1}s`}}/>
            </g>);
          })}
        </svg>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
          <div style={{fontSize:42,fontWeight:700,color:"#FFFFFF",letterSpacing:"-2px",lineHeight:1,animation:"countUp 0.4s ease"}}>
            {noMeals ? "—" : <AnimatedNumber value={avgScore||0} decimals={1}/>}
          </div>
          <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.25)",letterSpacing:"1.5px",textTransform:"uppercase"}}>
            NOURI SCORE
          </div>
        </div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:14,marginTop:10}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#3ECF8E",flexShrink:0}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{calLabel}</span>
        </div>
        {!noMeals&&(<div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:3,background:"rgba(255,255,255,0.6)",flexShrink:0}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>{protLabel}</span>
        </div>)}
      </div>
    </div>
  );
}
// ─── TODAY SCREEN ─────────────────────────────────────────────────────────────
function TodayScreen({meals,goals,allMeals,allCheckins,onViewMeal,onMealAdjust,dayCount,profile,onCheckinDone,onMilestoneDismiss,pendingMilestone}){
  const [viewDate,setViewDate]=useState(today());
  const isToday=viewDate===today();
  const viewMeals=useMemo(()=>isToday?meals:(allMeals[viewDate]||[]),[isToday,meals,allMeals,viewDate]);
  const viewTotals=useMemo(()=>sumNutrients(viewMeals.map(m=>({nutrients:m.meal_totals}))),[viewMeals]);
  const [checkinDone,setCheckinDone]=useState(false);
  const [sleep,setSleep]=useState(0);
  const [energy,setEnergy]=useState(0);
  const [gapCollapsed,setGapCollapsed]=useState(false);
  const [tick,setTick]=useState(0);
  useEffect(()=>{
    const t=setInterval(()=>setTick(n=>n+1),60000);
    return()=>clearInterval(t);
  },[]);
  const [weeklyCollapsed,setWeeklyCollapsed]=useState(false);

  const hour=new Date().getHours();
  const greeting=hour<11?"Good morning":hour<16?"Good afternoon":"Good evening";

  const prevDay=()=>{const d=new Date(viewDate+'T12:00:00');d.setDate(d.getDate()-1);setViewDate(localDateKey(d));};
  const nextDay=()=>{if(viewDate>=today())return;const d=new Date(viewDate+'T12:00:00');d.setDate(d.getDate()+1);setViewDate(localDateKey(d));};
  const dateLabel=useMemo(()=>{
    if(isToday)return null;
    const yest=new Date();yest.setDate(yest.getDate()-1);
    if(viewDate===localDateKey(yest))return"Yesterday";
    return new Date(viewDate+'T12:00:00').toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"});
  },[viewDate,isToday]);

  const macros=[{key:"calories",label:"Calories",icon:"⚡",color:C.amber},{key:"protein_g",label:"Protein",icon:"💪",color:C.green},{key:"carbs_g",label:"Carbs",icon:"🌾",color:C.blue},{key:"fat_g",label:"Fat",icon:"🥑",color:C.purple}];

  const hasCheckin=allCheckins&&allCheckins[today()];
  const dayScores=viewMeals.filter(m=>m.meal_totals).map(m=>mealScore(m.meal_totals,goals));
  const avgScore=dayScores.length?Math.round(dayScores.reduce((s,v)=>s+v,0)/dayScores.length*10)/10:null;

  // Gaps for today
  const gapItems=viewMeals.length>0?Object.keys(NUTRIENT_FOOD_SUGGESTIONS).map(k=>({key:k,label:NUTRIENT_LABELS[k],pct:pct(viewTotals[k]||0,goals[k]||DEFAULT_GOALS[k]),foods:NUTRIENT_FOOD_SUGGESTIONS[k]})).filter(g=>g.pct<40).sort((a,b)=>a.pct-b.pct).slice(0,3):[];

  // Post-meal check
  const lastMeal=meals[meals.length-1];
  const showPostMeal=useMemo(()=>{
    if(!isToday)return false;
    if(!lastMeal||lastMeal.post_meal_checked)return false;
    if(lastMeal.source==="quick")return false;
    if((lastMeal.meal_totals?.calories||0)<50)return false;
    const elapsed=(Date.now()-new Date(lastMeal.timestamp).getTime())/60000;
    return elapsed>25&&elapsed<120;
  },[lastMeal,tick,isToday]);

  // Insight rotation
  const insightData=useMemo(()=>{
    if(dayCount<7)return null;
    const{insights}=generateInsights(allMeals,goals,allCheckins);
    if(!insights.length)return null;
    const idx=Math.floor(Date.now()/86400000)%insights.length;
    return insights[idx];
  },[allMeals,goals,allCheckins,dayCount]);

  // Weekly summary (Sunday or Monday)
  const dow=new Date().getDay();
  const showWeekly=(dow===0||dow===1)&&dayCount>=7;
  const weeklySummary=showWeekly?buildWeeklySummary(allMeals,goals):null;

  const submitCheckin=()=>{
    if(!sleep||!energy)return;
    onCheckinDone({sleep_score:sleep,energy_score:energy});
    setCheckinDone(true);
  };

  return(
    <div style={{padding:"64px 24px 110px",overflowY:"auto",height:"100dvh"}}>
      {/* Header with date navigation */}
      <div style={{marginBottom:24,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={prevDay} style={{background:"none",border:"none",color:C.textDim,fontSize:20,cursor:"pointer",padding:"8px",touchAction:"manipulation",lineHeight:1}}>‹</button>
          <div>
            <div style={{color:"rgba(255,255,255,0.25)",fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>{isToday?new Date().toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"}):dateLabel}</div>
            <div style={{color:"#FFFFFF",fontSize:32,fontWeight:700,marginTop:3,letterSpacing:"-0.5px"}}>{isToday?greeting:dateLabel}</div>
          </div>
          <button onClick={nextDay} style={{background:"none",border:"none",color:viewDate>=today()?C.textDisabled:C.textDim,fontSize:20,cursor:viewDate>=today()?"default":"pointer",padding:"8px",touchAction:"manipulation",lineHeight:1}}>›</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {!isToday&&<button onClick={()=>setViewDate(today())} style={{background:C.greenDim,border:`0.5px solid ${C.green}40`,borderRadius:16,padding:"5px 10px",color:C.green,fontSize:11,fontWeight:600,cursor:"pointer",touchAction:"manipulation"}}>Today</button>}
          {isToday&&(profile?.current_streak||0)>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.05)",border:"0.5px solid rgba(255,255,255,0.09)",borderRadius:20,padding:"6px 12px"}}>
            <span style={{fontSize:12}}>🔥</span>
            <span style={{color:"rgba(255,255,255,0.75)",fontSize:12,fontWeight:600}}>{profile.current_streak}</span>
            <span style={{color:"rgba(255,255,255,0.2)",fontSize:10}}>day{profile.current_streak===1?"":"s"}</span>
          </div>}
        </div>
      </div>

      {/* Milestone toast */}
      {pendingMilestone&&(
        <MilestoneToast milestone={pendingMilestone} onDismiss={()=>onMilestoneDismiss(pendingMilestone.id)}/>
      )}

      {/* Morning check-in */}
      {isToday&&!hasCheckin&&!checkinDone&&(
        <div style={{background:"rgba(255,255,255,0.02)",border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:16,padding:"16px 18px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <div style={{width:6,height:6,borderRadius:3,background:C.green,flexShrink:0}}/>
            <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>MORNING CHECK-IN</div>
          </div>
          <RatingRow label="😴  How did you sleep?" value={sleep} onChange={setSleep}/>
          <RatingRow label="🪫  How's your energy?" value={energy} onChange={setEnergy}/>
          <button onClick={submitCheckin} disabled={!sleep||!energy} style={{width:"100%",padding:"11px",background:sleep&&energy?`linear-gradient(135deg,${C.green},${C.green2})`:"rgba(255,255,255,0.05)",border:`0.5px solid ${sleep&&energy?"transparent":"rgba(255,255,255,0.06)"}`,borderRadius:12,color:sleep&&energy?"#000":C.textVeryDim,fontSize:13,fontWeight:700,cursor:sleep&&energy?"pointer":"default",marginTop:4,letterSpacing:"-0.1px"}}>Log check-in</button>
        </div>
      )}
      {isToday&&checkinDone&&<div style={{color:C.green,fontSize:12,textAlign:"center",marginBottom:14,fontWeight:600,letterSpacing:"0.2px"}}>✓ Morning check-in logged</div>}

      {/* Hero Ring */}
      <HeroRing totals={viewTotals} goals={goals} avgScore={avgScore} meals={viewMeals}/>

      {/* Gap card */}
      {gapItems.length>0&&(
        <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"14px 16px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:gapCollapsed?0:10}}>
            <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>STILL TO GET TODAY</div>
            <button onClick={()=>setGapCollapsed(!gapCollapsed)} style={{background:"none",border:"none",color:C.textVeryDim,fontSize:11,cursor:"pointer",padding:"8px 12px",margin:"-8px -12px",touchAction:"manipulation"}}>{gapCollapsed?"show":"hide"}</button>
          </div>
          {!gapCollapsed&&gapItems.map(g=>(
            <div key={g.key} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                <div>
                  {LIFE_IMPACT[g.key]&&<div style={{color:C.textVeryDim,fontSize:10,fontWeight:600,marginBottom:1}}>{LIFE_IMPACT[g.key].icon} {LIFE_IMPACT[g.key].area}</div>}
                  <div style={{color:C.textPrimary,fontSize:13,fontWeight:600}}>{g.label} — <span style={{color:C.amber}}>{Math.round(g.pct)}%</span> of target</div>
                </div>
              </div>
              <div style={{color:C.textDim,fontSize:12}}>Try: {g.foods.slice(0,3).join(", ")}</div>
            </div>
          ))}
        </div>
      )}

      {/* Weekly summary or insight */}
      {isToday&&showWeekly&&weeklySummary&&!weeklyCollapsed?(
        <div style={{background:C.card,border:`0.5px solid ${C.border}`,borderRadius:16,padding:"16px 18px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>YOUR WEEK IN REVIEW</div>
            <button onClick={()=>setWeeklyCollapsed(true)} style={{background:"none",border:"none",color:C.textVeryDim,fontSize:11,cursor:"pointer"}}>hide</button>
          </div>
          <div style={{color:C.textPrimary,fontSize:13,marginBottom:4}}>{weeklySummary.mealsThisWeek} meals logged · {weeklySummary.avgScore} avg score</div>
          <div style={{color:C.green,fontSize:12,marginBottom:2}}>✓ Nailed your {weeklySummary.topNut} this week</div>
          <div style={{color:C.amber,fontSize:12}}>{weeklySummary.gapNut} needs more attention</div>
          {(profile?.current_streak||0)>0&&<div style={{color:C.textDim,fontSize:12,marginTop:4}}>🔥 {profile.current_streak}-day logging streak</div>}
        </div>
      ):insightData?(
        <div style={{marginBottom:14}}><InsightCard insight={insightData}/></div>
      ):dayCount<7?(
        <div style={{background:"rgba(255,255,255,0.02)",border:"0.5px solid rgba(255,255,255,0.05)",borderRadius:16,padding:"18px 20px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{color:"rgba(255,255,255,0.2)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>YOUR PICTURE</div>
            <div style={{color:C.green,fontSize:11,fontWeight:600}}>{Math.max(1,dayCount)}/7 days</div>
          </div>
          <div style={{color:"rgba(255,255,255,0.85)",fontSize:14,fontWeight:600,letterSpacing:"-0.2px",marginBottom:4}}>Insights unlock after 7 days of logging</div>
          <div style={{color:"rgba(255,255,255,0.3)",fontSize:12,lineHeight:1.55,marginBottom:12}}>Nouri builds a personal picture of your nutrition patterns before it starts coaching you.</div>

            <div style={{height:"100%",width:`${Math.min(100,(dayCount/7)*100)}%`,background:`linear-gradient(90deg,${C.green},${C.green2})`,borderRadius:2,transition:"width 0.6s ease"}}/>

      ):null}

      {/* Post-meal check */}

              <div style={{color:"rgba(255,255,255,0.75)",fontSize:13,fontWeight:600}}>How much of {lastMeal?.meal_name||"your meal"} did you finish?</div>

// ─── INSIGHTS SCREEN ──────────────────────────────────────────────────────────
function InsightsScreen({allMeals,goals,allCheckins}){
  const dates=Object.keys(allMeals).sort();
  const {insights,gaps,weeklyRhythm}=useMemo(()=>dates.length>=7?generateInsights(allMeals,goals,allCheckins):{insights:[],gaps:[],weeklyRhythm:[]},[allMeals,goals,allCheckins,dates.length]);
  return(

// ─── HISTORY SCREEN ───────────────────────────────────────────────────────────
function HistoryScreen({allMeals,goals,onViewMeal}){
  const now=new Date();
  const [calYear,setCalYear]=useState(now.getFullYear());
  const [calMonth,setCalMonth]=useState(now.getMonth());
  const [selectedDate,setSelectedDate]=useState(null);
  const dates=Object.keys(allMeals).sort().reverse();

  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const calDays=[];
  for(let i=0;i<firstDay;i++)calDays.push(null);
  for(let d=1;d<=daysInMonth;d++)calDays.push(d);

  const getDayScore=(d)=>{
    const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const meals=allMeals[dk]||[];
    if(!meals.length)return null;
    const totals=sumNutrients(meals.map(m=>({nutrients:m.meal_totals})));
    const scores=Object.keys(DEFAULT_GOALS).map(k=>goals[k]?Math.min(1,(totals[k]||0)/goals[k]):0);
    return scores.reduce((s,v)=>s+v,0)/scores.length;
  };

  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const displayDates=selectedDate?[selectedDate]:dates;

  return(
    <div style={{padding:"56px 24px 100px",overflowY:"auto",height:"100dvh"}}>
      <div style={{marginBottom:20}}>
        <div style={{color:C.textVeryDim,fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>Your</div>
        <div style={{color:C.textPrimary,fontSize:22,fontWeight:700,marginTop:4}}>History</div>
      </div>
      {/* Calendar */}
      <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"16px 18px",marginBottom:20}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>{let m=calMonth-1;let y=calYear;if(m<0){m=11;y--;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:C.textDim,fontSize:18,cursor:"pointer",padding:"8px 16px",touchAction:"manipulation"}}>‹</button>
          <div style={{color:C.textPrimary,fontSize:14,fontWeight:600}}>{monthNames[calMonth]} {calYear}</div>
          <button onClick={()=>{let m=calMonth+1;let y=calYear;if(m>11){m=0;y++;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:C.textDim,fontSize:18,cursor:"pointer",padding:"8px 16px",touchAction:"manipulation"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
          {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",color:C.textVeryDim,fontSize:10,fontWeight:600,padding:"2px 0"}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {calDays.map((d,i)=>{
            if(!d)return<div key={i}/>;
            const score=getDayScore(d);
            const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const isSelected=selectedDate===dk;
            return(
              <button key={i} onClick={()=>setSelectedDate(isSelected?null:dk)} style={{aspectRatio:"1",borderRadius:6,border:`0.5px solid ${isSelected?C.green:score!=null?"rgba(62,207,142,0.2)":"transparent"}`,background:score!=null?`rgba(62,207,142,${0.08+score*0.5})`:"transparent",color:isSelected?C.green:score!=null?C.textPrimary:C.textVeryDim,fontSize:11,fontWeight:score!=null?600:400,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
                {d}
                {score!=null&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",width:3,height:3,borderRadius:2,background:C.green}}/>}
              </button>
            );
          })}
        </div>
        {selectedDate&&<button onClick={()=>setSelectedDate(null)} style={{display:"block",width:"100%",marginTop:8,background:"none",border:"none",color:C.textVeryDim,fontSize:12,cursor:"pointer"}}>Show all</button>}
      </div>
      {/* Meal list */}
      {dates.length===0?<div style={{color:C.textDim,fontSize:14,textAlign:"center",paddingTop:30}}>Your food history will appear here.</div>
      :displayDates.map(date=>{
        const meals=allMeals[date]||[];if(!meals.length)return null;
        const totals=sumNutrients(meals.map(m=>({nutrients:m.meal_totals})));
        return(
          <div key={date} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <div style={{color:C.textDim,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>{parseLocalDateKey(date).toLocaleDateString("en",{weekday:"short",month:"short",day:"numeric"})}</div>
              <div style={{color:C.textVeryDim,fontSize:11}}>{Math.round(totals.calories)} cal</div>
            </div>
            <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",marginBottom:8}}>
              <div style={{height:"100%",width:`${pct(totals.calories,goals.calories||2000)}%`,background:C.amber,borderRadius:2}}/>
            </div>
            {meals.map(meal=><MealEntry key={meal.id} meal={meal} onTap={typeof onViewMeal==="function"?()=>onViewMeal(meal):undefined} goals={goals}/>)}
          </div>
        );
      })}
      {selectedDate&&!(allMeals[selectedDate]||[]).length&&(
        <div style={{color:C.textDim,fontSize:13,textAlign:"center",paddingTop:12}}>No meals logged on {parseLocalDateKey(selectedDate).toLocaleDateString("en",{month:"short",day:"numeric"})}.</div>
      )}
    </div>
  );
}

// ─── ME SCREEN ────────────────────────────────────────────────────────────────
function MeScreen({profile,goals,quickAdds,onSave,onRecalibrate,onSaveQuickAdds}){
  const [localGoals,setLocalGoals]=useState({...goals});
  const [preset,setPreset]=useState(profile.goal_preset||"general");
  const [saved,setSaved]=useState(false);
  const [localQA,setLocalQA]=useState((quickAdds||DEFAULT_QUICK_ADDS).map(normalizeQuickAdd));
  const [editingQA,setEditingQA]=useState(null);
  const [newQA,setNewQA]=useState(null);
  const EMOJIS=["💧","☕","💊","🥤","🍌","🥜","🍎","🥛","🧃","🍫","🥚","🫐"];

  const applyPreset=p=>{setPreset(p);if(p==="general")setLocalGoals({...DEFAULT_GOALS});else if(p==="high_protein")setLocalGoals({...HIGH_PROTEIN_GOALS});};
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('nouri:api_key')||'');
  const saveApiKey=(k)=>{setApiKey(k);localStorage.setItem('nouri:api_key',k);};
  const handleSave=()=>{
    onSave({...profile, goals:localGoals, goal_preset:preset});setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const QAForm=({item,onDone,onCancel})=>{
    const [name,setName]=useState(item?.label||"");
    const [emoji,setEmoji]=useState(item?.emoji||"🥤");
    const [cal,setCal]=useState(item?.nutrients?.calories||0);
    const [prot,setProt]=useState(item?.nutrients?.protein_g||0);
    const [carb,setCarb]=useState(item?.nutrients?.carbs_g||0);
    const [fat,setFat]=useState(item?.nutrients?.fat_g||0);
    const save=()=>{
      if(!name.trim())return;
      const nutrients={...Object.fromEntries(Object.keys(DEFAULT_GOALS).map(k=>[k,0])),calories:Number(cal),protein_g:Number(prot),carbs_g:Number(carb),fat_g:Number(fat)};
      onDone({id:item?.id||uid(),label:name.trim(),emoji,nutrients});
    };
    return(
      <div style={{background:C.inputBg,border:`0.5px solid ${C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {EMOJIS.map(e=>(<button key={e} onClick={()=>setEmoji(e)} style={{width:44,height:44,borderRadius:8,border:`1px solid ${e===emoji?C.green:C.border}`,background:e===emoji?C.greenDim:"transparent",fontSize:18,cursor:"pointer",touchAction:"manipulation"}}>{e}</button>))}
        </div>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Item name" style={{width:"100%",padding:"8px 12px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textPrimary,fontSize:14,marginBottom:8}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[["Cal",cal,setCal],["Protein g",prot,setProt],["Carbs g",carb,setCarb],["Fat g",fat,setFat]].map(([l,v,s])=>(
            <div key={l}>
              <div style={{color:C.textVeryDim,fontSize:10,marginBottom:3}}>{l}</div>
              <input type="number" value={v} onChange={e=>s(e.target.value)} style={{width:"100%",padding:"6px 10px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textPrimary,fontSize:13}}/>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={{flex:1,padding:"8px",background:`linear-gradient(135deg,${C.green},${C.green2})`,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}}>Save</button>
          <button onClick={onCancel} style={{flex:1,padding:"8px",background:C.card,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    );
  };

  const saveQA=(updated)=>{const norm=updated.map(normalizeQuickAdd);setLocalQA(norm);onSaveQuickAdds(norm);};

  const csvCell=(v)=>{const s=String(v??'');return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`  :s;};
  const exportCSV=async()=>{
    const mealsByDate=await storage.get('nouri:meals')||{};
    const rows=[["date","time","meal","source",...Object.keys(DEFAULT_GOALS)]];
    Object.keys(mealsByDate).sort().forEach(dk=>{
      (mealsByDate[dk]||[]).forEach(m=>{
        rows.push([dk,m.timestamp?new Date(m.timestamp).toLocaleTimeString():"",m.meal_name||"",m.source||"",...Object.keys(DEFAULT_GOALS).map(k=>m.meal_totals?.[k]||0)]);
      });
    });
    const csv=rows.map(r=>r.map(csvCell).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="nouri-export.csv";a.click();URL.revokeObjectURL(url);
  };

  return(
    <div style={{padding:"56px 24px 130px",overflowY:"auto",height:"100dvh"}}>
      <div style={{marginBottom:24}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px"}}>Your</div>
        <div style={{color:"#FFFFFF",fontSize:28,fontWeight:700,marginTop:3,letterSpacing:"-0.5px"}}>Profile & Goals</div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>GOAL TEMPLATE</div>
        <div style={{display:"flex",gap:8}}>
          {[["general","General Health"],["high_protein","High Protein"],["custom","Custom"]].map(([id,label])=>(
            <button key={id} onClick={()=>applyPreset(id)} style={{flex:1,padding:"10px 4px",borderRadius:10,background:preset===id?"rgba(62,207,142,0.10)":"rgba(255,255,255,0.04)",border:`0.5px solid ${preset===id?"rgba(62,207,142,0.45)":"rgba(255,255,255,0.07)"}`,color:preset===id?C.green:C.textDim,fontSize:11,fontWeight:600,cursor:"pointer",transition:"all 0.15s ease"}}>{label}</button>
          ))}
        </div>
        <div style={{color:C.textVeryDim,fontSize:11,marginTop:8}}>Change these anytime.</div>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>DAILY GOALS</div>
        {MACRO_KEYS.map(k=>(
          <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{color:C.textDim,fontSize:13}}>{NUTRIENT_LABELS[k]}</div>
            <input type="number" value={localGoals[k]||""} onChange={e=>{setPreset("custom");setLocalGoals(g=>({...g,[k]:Number(e.target.value)}));}} style={{width:80,padding:"8px 12px",background:C.inputBg,border:"0.5px solid rgba(255,255,255,0.08)",borderRadius:10,color:C.textPrimary,fontSize:13,textAlign:"right"}}/>
          </div>
        ))}
      </div>
      {/* Hand calibration */}
      <div style={{background:C.card,border:"0.5px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"16px 18px",marginBottom:16}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:8}}>HAND CALIBRATION</div>
        {profile.hand_calibrated?(
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div><div style={{color:C.green,fontSize:13,fontWeight:600}}>Calibrated</div><div style={{color:C.textDim,fontSize:12}}>Palm: {profile.palm_width_inches}"w × {profile.palm_length_inches}"l</div></div>
            <button onClick={onRecalibrate} style={{background:C.inputBg,border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:12,padding:"6px 12px",cursor:"pointer"}}>Recalibrate</button>
          </div>
        ):(
          <div>
            <div style={{color:C.textDim,fontSize:13,marginBottom:10}}>Add your hand measurement for more accurate portions.</div>
            <button onClick={onRecalibrate} style={{background:C.greenDim,border:`0.5px solid ${C.green}44`,borderRadius:8,color:C.green,fontSize:13,fontWeight:600,padding:"8px 16px",cursor:"pointer"}}>Calibrate Now</button>
          </div>
        )}
      </div>
      {/* Quick adds config */}
      <div style={{marginBottom:16}}>
        <div style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:10}}>QUICK ADDS</div>
        {localQA.map((item,idx)=>(
          <div key={item.id}>
            {editingQA===item.id?(
              <QAForm item={item} onDone={updated=>{const next=[...localQA];next[idx]=updated;saveQA(next);setEditingQA(null);}} onCancel={()=>setEditingQA(null)}/>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`0.5px solid ${C.border}`}}>
                <span style={{fontSize:20}}>{item.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{color:C.textPrimary,fontSize:13,fontWeight:600}}>{item.label}</div>
                  <div style={{color:C.textVeryDim,fontSize:11}}>{item.nutrients.calories||0} cal · {item.nutrients.protein_g||0}g protein</div>
                </div>
                <button onClick={()=>setEditingQA(item.id)} style={{background:"none",border:`0.5px solid ${C.border}`,borderRadius:8,color:C.textDim,fontSize:11,padding:"4px 10px",cursor:"pointer"}}>Edit</button>
                <button onClick={()=>saveQA(localQA.filter((_,i)=>i!==idx))} style={{background:"none",border:"none",color:C.textVeryDim,fontSize:16,cursor:"pointer",width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>×</button>
              </div>
            )}
          </div>
        ))}
        {newQA?<QAForm item={null} onDone={item=>{saveQA([...localQA,item]);setNewQA(false);}} onCancel={()=>setNewQA(false)}/>
        :<button onClick={()=>setNewQA(true)} style={{width:"100%",padding:"10px",background:C.inputBg,border:`0.5px dashed ${C.border}`,borderRadius:10,color:C.textDim,fontSize:13,cursor:"pointer",marginTop:8}}>+ Add custom item</button>}
      </div>
      <button onClick={exportCSV} style={{width:"100%",padding:13,background:"rgba(255,255,255,0.04)",border:"0.5px solid rgba(255,255,255,0.07)",borderRadius:12,color:C.textDim,fontSize:13,fontWeight:500,cursor:"pointer",marginBottom:12}}>Export to CSV</button>
      {/* API key */}
      <div style={{background:C.card,border:`0.5px solid ${C.border}`,borderRadius:12,padding:'14px 16px',marginBottom:12}}>
        <div style={{color:C.green,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.8px',marginBottom:8}}>AI CONNECTION</div>
        <div style={{color:C.textDim,fontSize:12,marginBottom:8}}>Paste your Anthropic API key to enable photo analysis and food search. Get a free key at anthropic.com.</div>
        <input
          type='password'
          value={apiKey}
          onChange={e=>saveApiKey(e.target.value)}
          placeholder='sk-ant-...'
          style={{width:'100%',padding:'10px 12px',background:C.inputBg,border:`0.5px solid ${apiKey?C.green:C.border}`,
            borderRadius:8,color:C.textPrimary,fontSize:13,fontFamily:'monospace'}}
        />
        {apiKey&&<div style={{color:C.green,fontSize:11,marginTop:6}}>✓ Key saved</div>}

      <button onClick={handleSave} style={{width:"100%",padding:15,background:`linear-gradient(150deg,${C.green},${C.green2})`,border:"none",borderRadius:12,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 6px 20px rgba(62,207,142,0.28)`,letterSpacing:"-0.1px"}}>{saved?"Saved!":"Save Goals"}</button>
      <div style={{textAlign:"center",marginTop:28,color:C.textVeryDim,fontSize:11}}>Your food. Your body. Connected.</div>
    </div>
  );
}

  const stopCam=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  const capture=async()=>{
    if(!videoRef.current)return;setError(null);
    const canvas=document.createElement("canvas");canvas.width=videoRef.current.videoWidth;canvas.height=videoRef.current.videoHeight;
    canvas.getContext("2d").drawImage(videoRef.current,0,0);stopCam();setStep(2);

      const res=await fetch(API_URL,{

        body:JSON.stringify({model:MODEL,max_tokens:500,
          system:"You are measuring a human hand next to a standard credit card (3.375 x 2.125 inches). Estimate the palm width (across the widest part, excluding thumb) and palm length (wrist to base of middle finger). Respond ONLY in JSON: {\"palm_width_inches\": X.X, \"palm_length_inches\": X.X}",

          <circle cx="32" cy="32" r="10" stroke="rgba(251,191,36,0.6)" strokeWidth="2.5" strokeLinecap="round"
            strokeDasharray="42 20" strokeDashoffset="20"/>
        </svg>
        <div style={{color:"#FFFFFF",fontSize:30,fontWeight:700,textAlign:"center",letterSpacing:"-0.5px",lineHeight:1.2,marginBottom:14}}>

function hydrateComponent(c) {
  const baseNutrients = { ...(c?._baseNutrients || c?.nutrients || {}) };
  const cookingMethod = c?.cooking_method || "raw";
  const explicitMult = c?._mult ?? c?.portion_multiplier;
  const learnedMult = c?.learnedMultiplier ?? c?.learned_multiplier;
  const mult = explicitMult ?? learnedMult ?? 1;
  const isUsual = explicitMult == null && learnedMult != null;
  const adj = COOKING_ADJUSTMENTS[cookingMethod] || {};
  const nutrients = {};
  Object.keys(baseNutrients).forEach(k => {
    const baseValue = baseNutrients[k] || 0;
    const cookedValue = adj[k] != null ? baseValue * adj[k] : baseValue;
    nutrients[k] = cookedValue * mult;
  });
  return { ...c, _baseNutrients: baseNutrients, cooking_method: cookingMethod, _mult: mult, _isUsual: isUsual, nutrients };
}
